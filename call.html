<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkUp - Studio Quality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --card: rgba(12, 12, 20, 0.92);
            --border: rgba(255, 255, 255, 0.07);
            --text: #f0f0f5;
            --muted: #5a5a70;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #f43f5e;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
            background: var(--bg);
        }
        
        .bg-mesh {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(ellipse 90% 70% at 50% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 70% 60% at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                var(--bg);
        }
        
        .bg-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 10%, transparent 70%);
        }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            backdrop-filter: blur(50px);
            box-shadow: 
                0 0 0 1px rgba(255,255,255,0.04) inset, 
                0 40px 80px -20px rgba(0,0,0,0.7), 
                0 0 120px -40px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }
        
        .input-field {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            border-radius: 14px;
        }
        
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }
        
        .input-field::placeholder { color: var(--muted); }
        .input-field.error { border-color: var(--danger); }
        
        .btn {
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            border: none;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 14px;
            user-select: none;
        }
        
        .btn:active:not(:disabled) { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.5);
            transform: translateY(-1px);
        }
        
        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover:not(:disabled) { background: rgba(255, 255, 255, 0.1); color: var(--text); }
        
        .btn-danger {
            background: linear-gradient(135deg, #e11d48 0%, var(--danger) 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(244, 63, 94, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #059669 0%, var(--success) 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }
        
        .screen {
            display: none;
            animation: screenIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .screen.active { display: block; }
        
        @keyframes screenIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.7); opacity: 0; }
        }
        
        .pulse-ring {
            position: absolute; inset: -6px; border-radius: 50%;
            border: 2px solid currentColor;
            animation: pulseRing 2s ease-out infinite;
            pointer-events: none;
        }
        
        .visualizer-canvas {
            width: 100%; height: 60px;
            display: block;
            border-radius: 12px;
            background: rgba(0,0,0,0.4);
        }
        
        .status-indicator {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--success); position: relative;
        }
        
        #toastContainer {
            position: fixed; top: 16px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 8px;
            z-index: 1000; pointer-events: none;
        }
        
        .toast {
            background: rgba(10, 10, 15, 0.95);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: toastSlide 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        @keyframes toastSlide {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
        }
        
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: center;
            padding: 1rem; z-index: 100;
            opacity: 0; visibility: hidden;
            transition: all 0.25s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-overlay.active .card { animation: modalPop 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
        }
        
        .peer-id-display {
            font-family: 'Space Grotesk', monospace;
            font-weight: 700; font-size: 20px;
            color: var(--accent); letter-spacing: -0.3px;
        }
        
        .section-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; color: var(--muted);
            font-weight: 600;
        }
        
        .icon-box {
            display: inline-flex; align-items: center; justify-content: center;
            width: 60px; height: 60px; border-radius: 20px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(139, 92, 246, 0.05) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .quality-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 20px;
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .quality-badge.excellent { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--success); }
        .quality-badge.good { background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3); color: var(--accent); }
        .quality-badge.poor { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--warning); }
        .quality-badge.bad { background: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.3); color: var(--danger); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div id="toastContainer"></div>
    
    <!-- Lobby Screen -->
    <div id="lobbyScreen" class="screen active">
        <div class="card">
            <div class="p-8 text-center">
                <div class="icon-box mx-auto mb-5">
                    <i data-lucide="headphones" class="w-7 h-7 text-purple-400"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight mb-1">LinkUp</h1>
                <p class="text-sm text-zinc-500 mb-4">Studio Quality Audio</p>
            </div>
            
            <div class="divider"></div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="section-label block mb-2.5">Custom ID (optioneel)</label>
                    <input type="text" id="customIdInput" class="input-field w-full px-4 py-3.5" placeholder="Laat leeg voor auto-ID..." maxlength="20" autocomplete="off">
                </div>
                <button id="connectBtn" class="btn btn-primary w-full py-4 text-sm">
                    <i data-lucide="wifi" class="w-4 h-4"></i>
                    Verbind met Netwerk
                </button>
                <p id="lobbyStatus" class="text-center text-xs text-zinc-600 h-4"></p>
            </div>
        </div>
    </div>
    
    <!-- Main Screen -->
    <div id="mainScreen" class="screen">
        <div class="card">
            <div class="p-4 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <div class="status-indicator"><div class="pulse-ring" style="color: var(--success);"></div></div>
                    <span class="text-xs text-zinc-500 font-medium">Verbonden</span>
                </div>
                <button id="copyIdBtn" class="btn btn-ghost text-xs px-3.5 py-2">
                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                    Kopieer
                </button>
            </div>
            
            <div class="divider"></div>
            
            <div class="p-6 text-center">
                <p class="section-label mb-2">Jouw ID</p>
                <p id="myPeerId" class="peer-id-display truncate">---</p>
            </div>
            
            <div class="divider"></div>
            
            <div class="p-6 space-y-3">
                <label class="section-label block">Partner ID</label>
                <div class="flex gap-2">
                    <input type="text" id="remoteIdInput" class="input-field flex-1 px-4 py-3.5 min-w-0" placeholder="Vul partner ID in..." autocomplete="off">
                    <button id="callBtn" class="btn btn-primary px-5" aria-label="Start gesprek">
                        <i data-lucide="phone" class="w-4 h-4"></i>
                    </button>
                </div>
                <p id="mainStatus" class="text-center text-xs h-4 pt-0.5"></p>
            </div>
            
            <div class="divider"></div>
            
            <div class="p-4">
                <button id="disconnectBtn" class="btn btn-ghost w-full py-3 text-sm text-zinc-500">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    Verbreek Verbinding
                </button>
            </div>
        </div>
    </div>
    
    <!-- Call Screen -->
    <div id="callScreen" class="screen">
        <div class="card">
            <div class="p-6 text-center">
                <p class="section-label mb-1.5">In Gesprek Met</p>
                <h2 id="remotePeerName" class="peer-id-display text-xl truncate px-2 mb-3">Partner</h2>
                <div class="flex items-center justify-center gap-3">
                    <span id="callDuration" class="text-xs font-mono text-zinc-400 bg-black/40 px-4 py-2 rounded-lg border border-white/5">00:00</span>
                    <div id="qualityBadge" class="quality-badge excellent">
                        <i data-lucide="activity" class="w-3 h-3"></i>
                        <span id="qualityText">Uitstekend</span>
                    </div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <div class="p-3">
                <canvas id="visualizer" class="visualizer-canvas"></canvas>
            </div>
            
            <div class="divider"></div>
            
            <div class="p-5">
                <div class="flex items-center justify-between bg-black/30 rounded-2xl p-4 mb-6 border border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-zinc-800/80 flex items-center justify-center">
                            <i data-lucide="user" class="w-4 h-4 text-zinc-400"></i>
                        </div>
                        <div>
                            <p class="text-sm font-medium">Jij</p>
                            <p id="localStatusText" class="text-xs text-emerald-400">Microfoon aan</p>
                        </div>
                    </div>
                    <div id="localMuteIndicator" class="w-3 h-3 rounded-full bg-emerald-500 transition-colors"></div>
                </div>
                
                <div class="flex justify-center items-center gap-5">
                    <button id="muteBtn" class="btn w-14 h-14 rounded-full bg-zinc-800/80 border border-white/10 hover:bg-zinc-700/80 transition-all" aria-label="Dempen">
                        <i data-lucide="mic" class="w-5 h-5" id="muteIcon"></i>
                    </button>
                    <button id="hangupBtn" class="btn btn-danger w-16 h-16 rounded-full" aria-label="Ophangen">
                        <i data-lucide="phone-off" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Incoming Call Modal -->
    <div id="incomingModal" class="modal-overlay">
        <div class="card">
            <div class="p-8 text-center">
                <div class="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center mx-auto mb-6 relative">
                    <div class="pulse-ring" style="color: var(--success);"></div>
                    <i data-lucide="phone-incoming" class="w-7 h-7 text-white"></i>
                </div>
                <p class="section-label mb-1.5">Inkomende Oproep</p>
                <p id="callerId" class="peer-id-display text-lg truncate mb-8 px-2">Onbekend</p>
                
                <div class="grid grid-cols-2 gap-3">
                    <button id="declineBtn" class="btn btn-danger py-3.5 text-sm">
                        <i data-lucide="phone-off" class="w-4 h-4"></i>
                        Weiger
                    </button>
                    <button id="acceptBtn" class="btn btn-success py-3.5 text-sm">
                        <i data-lucide="phone" class="w-4 h-4"></i>
                        Neem op
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
    (function() {
        'use strict';
        
        const SIGNAL = Object.freeze({ REJECT: 'reject', BUSY: 'busy', HANGUP: 'hangup', MUTE: 'mute' });
        
        // High definition audio constraints
        // We disable autoGainControl because it often causes volume dips ("verzwakking") during silence.
        const AUDIO_CONSTRAINTS = Object.freeze({
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: false, 
                sampleRate: 48000,
                channelCount: 2,
                latency: 0
            },
            video: false
        });
        
        const state = {
            peer: null,
            localStream: null,
            currentCall: null,
            remotePeerId: null,
            activeConn: null,
            audioCtx: null,
            analyser: null,
            sourceNode: null, // Keep reference to disconnect properly
            animationId: null,
            timerInterval: null,
            startTime: null,
            isMuted: false,
            timeoutTimer: null,
            audioElement: null,
            isCallActive: false,
            qualityInterval: null
        };
        
        const $ = (id) => document.getElementById(id);
        
        const ui = {
            screens: { lobby: $('lobbyScreen'), main: $('mainScreen'), call: $('callScreen') },
            lobby: { input: $('customIdInput'), btn: $('connectBtn'), status: $('lobbyStatus') },
            main: {
                id: $('myPeerId'), copyBtn: $('copyIdBtn'), remoteInput: $('remoteIdInput'),
                callBtn: $('callBtn'), status: $('mainStatus'), disconnectBtn: $('disconnectBtn')
            },
            call: {
                remoteName: $('remotePeerName'), localStatus: $('localStatusText'),
                localInd: $('localMuteIndicator'), muteBtn: $('muteBtn'),
                muteIcon: $('muteIcon'), hangup: $('hangupBtn'), duration: $('callDuration'),
                canvas: $('visualizer'), qualityBadge: $('qualityBadge'), qualityText: $('qualityText')
            },
            modal: { el: $('incomingModal'), callerId: $('callerId'), accept: $('acceptBtn'), decline: $('declineBtn') },
            toasts: $('toastContainer')
        };
        
        lucide.createIcons();
        
        // --- Core Utilities ---
        
        function showScreen(name) {
            Object.values(ui.screens).forEach(s => s.classList.remove('active'));
            ui.screens[name].classList.add('active');
        }
        
        function toast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            if (type === 'error') t.style.borderColor = 'rgba(244, 63, 94, 0.5)';
            else if (type === 'success') t.style.borderColor = 'rgba(16, 185, 129, 0.5)';
            
            ui.toasts.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 3000);
        }
        
        function formatDuration(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }
        
        function setMainStatus(msg, type = 'neutral') {
            ui.main.status.textContent = msg;
            ui.main.status.style.color = type === 'error' ? '#f43f5e' : type === 'success' ? '#10b981' : '#5a5a70';
        }
        
        // --- SDP Manipulation for High Quality ---
        // This forces the Opus codec to use maximum bitrate, preventing quality degradation.
        function forceHighQualitySDP(sdp) {
            if (!sdp) return sdp;
            // Force Opus stereo and high bitrate
            return sdp.replace(/a=fmtp:111/, 'a=fmtp:111 stereo=1;maxaveragebitrate=510000;maxplaybackrate=48000;minptime=10;useinbandfec=1');
        }
        
        // --- Quality Monitoring ---
        function startQualityMonitor() {
            if (state.qualityInterval) clearInterval(state.qualityInterval);
            
            state.qualityInterval = setInterval(async () => {
                if (!state.currentCall || !state.currentCall.peerConnection) return;
                
                try {
                    const stats = await state.currentCall.peerConnection.getStats();
                    let rtt = 0, lost = 0, received = 0;
                    
                    stats.forEach(report => {
                        if (report.type === 'candidate-pair' && report.state === 'succeeded') {
                            rtt = report.currentRoundTripTime ? report.currentRoundTripTime * 1000 : 0;
                        }
                        if (report.type === 'inbound-rtp' && report.kind === 'audio') {
                            lost = report.packetsLost || 0;
                            received = report.packetsReceived || 0;
                        }
                    });
                    
                    updateQualityUI(rtt, lost, received);
                } catch (e) { /* silent fail */ }
            }, 2000);
        }
        
        function updateQualityUI(rtt, lost, received) {
            const badge = ui.call.qualityBadge;
            const text = ui.call.qualityText;
            const total = lost + received;
            const lossPercent = total > 0 ? (lost / total) * 100 : 0;
            
            badge.classList.remove('excellent', 'good', 'poor', 'bad');
            
            if (rtt < 150 && lossPercent < 0.5) { badge.classList.add('excellent'); text.textContent = 'Uitstekend'; }
            else if (rtt < 300 && lossPercent < 2) { badge.classList.add('good'); text.textContent = 'Goed'; }
            else if (rtt < 500 && lossPercent < 5) { badge.classList.add('poor'); text.textContent = 'Matig'; }
            else { badge.classList.add('bad'); text.textContent = 'Slecht'; }
        }
        
        function stopQualityMonitor() {
            if (state.qualityInterval) { clearInterval(state.qualityInterval); state.qualityInterval = null; }
        }
        
        // --- Audio Context & Visalizer Lifecycle ---
        
        function initAudioContext() {
            if (!state.audioCtx || state.audioCtx.state === 'closed') {
                state.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive', sampleRate: 48000 });
            }
            if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
        }
        
        function handleRemoteStream(stream) {
            // Clean up old audio element
            if (state.audioElement) { state.audioElement.pause(); state.audioElement.remove(); }
            
            state.audioElement = document.createElement('audio');
            state.audioElement.srcObject = stream;
            state.audioElement.autoplay = true;
            document.body.appendChild(state.audioElement);
            
            // Clean up old nodes to prevent memory leaks over hours
            if (state.sourceNode) {
                try { state.sourceNode.disconnect(); } catch(e) {}
            }
            
            initAudioContext();
            
            try {
                state.sourceNode = state.audioCtx.createMediaStreamSource(stream);
                state.analyser = state.audioCtx.createAnalyser();
                state.analyser.fftSize = 64;
                state.analyser.smoothingTimeConstant = 0.8;
                state.sourceNode.connect(state.analyser);
            } catch(e) { console.warn("Audio visualizer init failed", e); }
            
            enterCallUI();
        }
        
        function startVisualizer() {
            const canvas = ui.call.canvas;
            const ctx = canvas.getContext('2d');
            
            function draw() {
                state.animationId = requestAnimationFrame(draw);
                const w = canvas.width = canvas.offsetWidth * 2;
                const h = canvas.height = canvas.offsetHeight * 2;
                ctx.clearRect(0, 0, w, h);
                
                if (state.analyser) {
                    const arr = new Uint8Array(state.analyser.frequencyBinCount);
                    state.analyser.getByteFrequencyData(arr);
                    const barW = (w / arr.length) * 2;
                    let x = 0;
                    for (let i = 0; i < arr.length; i++) {
                        const barH = Math.max(4, (arr[i] / 255) * h * 0.85);
                        ctx.fillStyle = `rgba(139, 92, 246, ${0.6 + (arr[i]/255)*0.4})`;
                        ctx.beginPath();
                        ctx.roundRect(x, h - barH, barW - 3, barH, 4);
                        ctx.fill();
                        x += barW;
                    }
                } else {
                    // Fallback idle animation
                    ctx.fillStyle = 'rgba(139, 92, 246, 0.2)';
                    const bc = 16, bw = w / bc;
                    for (let i = 0; i < bc; i++) {
                        const bh = 8 + Math.sin(Date.now() / 500 + i) * 4;
                        ctx.beginPath();
                        ctx.roundRect(i * bw + 1.5, h - bh, bw - 3, bh, 3);
                        ctx.fill();
                    }
                }
            }
            draw();
        }
        
        // --- Peer Logic ---
        
        function initPeer(customId) {
            if (state.peer) { state.peer.destroy(); state.peer = null; }

            ui.lobby.btn.disabled = true;
            ui.lobby.status.textContent = 'Verbinden...';
            ui.lobby.input.classList.remove('error');
            
            const peerConfig = {
                debug: 0,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            };
            
            state.peer = new Peer(customId || undefined, peerConfig);
            
            state.peer.on('open', (peerId) => {
                ui.main.id.textContent = peerId;
                showScreen('main');
                toast('Verbonden met netwerk', 'success');
            });
            
            state.peer.on('connection', (conn) => {
                if (state.isCallActive) {
                    conn.on('open', () => conn.send({ type: SIGNAL.BUSY }));
                    setTimeout(() => conn.close(), 100);
                    return;
                }
                handleDataConnection(conn);
            });
            
            state.peer.on('call', (call) => {
                if (state.isCallActive) {
                    call.close();
                    toast('Gemiste oproep (bezig)', 'error');
                    return;
                }
                state.currentCall = call;
                state.remotePeerId = call.peer;
                ui.modal.callerId.textContent = call.peer;
                ui.modal.el.classList.add('active');
            });
            
            state.peer.on('error', (err) => {
                console.error('Peer Error:', err);
                ui.lobby.btn.disabled = false;
                ui.lobby.status.textContent = '';
                
                if (err.type === 'unavailable-id') {
                    toast('ID is al in gebruik.', 'error');
                    ui.lobby.input.classList.add('error');
                } else {
                    toast(`Fout: ${err.type}`, 'error');
                }
            });
        }
        
        function handleDataConnection(conn) {
            conn.on('open', () => { state.activeConn = conn; });
            conn.on('data', (data) => handleSignal(data));
            conn.on('close', () => { if (state.activeConn === conn) state.activeConn = null; });
        }
        
        function handleSignal(data) {
            if (data.type === SIGNAL.REJECT) { toast('Oproep geweigerd', 'error'); setMainStatus('Geweigerd', 'error'); cleanupCall(false); }
            else if (data.type === SIGNAL.BUSY) { toast('Gebruiker is bezig', 'error'); setMainStatus('Bezig', 'error'); cleanupCall(false); }
            else if (data.type === SIGNAL.HANGUP) { toast('Gesprek beëindigd'); cleanupCall(false); }
        }
        
        async function getAudio() {
            try { return await navigator.mediaDevices.getUserMedia(AUDIO_CONSTRAINTS); } 
            catch (e) { 
                // Fallback if specific constraints fail
                try { return await navigator.mediaDevices.getUserMedia({ audio: true }); }
                catch (e2) { return null; }
            }
        }
        
        async function startCall(remoteId) {
            if (!remoteId || !state.peer) return;
            ui.main.callBtn.disabled = true;
            setMainStatus('Verbinden...', 'neutral');
            
            const conn = state.peer.connect(remoteId, { reliable: true });
            handleDataConnection(conn);
            
            conn.on('open', async () => {
                state.localStream = await getAudio();
                if (!state.localStream) { toast('Geen microfoon toegang', 'error'); cleanupCall(false); return; }
                
                // Call with SDP transform
                const call = state.peer.call(remoteId, state.localStream, {
                    sdpTransform: forceHighQualitySDP
                });
                
                state.currentCall = call;
                state.remotePeerId = remoteId;
                state.isCallActive = true;
                setMainStatus('Overgaan...', 'neutral');
                
                state.timeoutTimer = setTimeout(() => {
                    if (!state.analyser) { toast('Geen antwoord', 'error'); cleanupCall(false); }
                }, 30000);
                
                call.on('stream', (remoteStream) => { clearTimeout(state.timeoutTimer); handleRemoteStream(remoteStream); });
                call.on('close', () => cleanupCall(false));
            });
        }
        
        async function acceptCall() {
            ui.modal.el.classList.remove('active');
            state.localStream = await getAudio();
            if (!state.localStream) { toast('Geen microfoon toegang', 'error'); cleanupCall(true); return; }
            
            state.currentCall.answer(state.localStream, { sdpTransform: forceHighQualitySDP });
            state.isCallActive = true;
            
            if (!state.activeConn) handleDataConnection(state.peer.connect(state.remotePeerId));
            
            state.currentCall.on('stream', (remoteStream) => handleRemoteStream(remoteStream));
            state.currentCall.on('close', () => cleanupCall(false));
        }
        
        function declineCall() {
            if (state.activeConn && state.activeConn.open) state.activeConn.send({ type: SIGNAL.REJECT });
            ui.modal.el.classList.remove('active');
            if (state.currentCall) state.currentCall.close();
            resetCallState();
        }
        
        function enterCallUI() {
            ui.call.remoteName.textContent = state.remotePeerId || 'Partner';
            showScreen('call');
            setMainStatus('');
            state.startTime = Date.now();
            state.timerInterval = setInterval(() => {
                ui.call.duration.textContent = formatDuration(Math.floor((Date.now() - state.startTime) / 1000));
            }, 1000);
            
            startVisualizer();
            startQualityMonitor();
        }
        
        function toggleMute() {
            if (!state.localStream) return;
            state.isMuted = !state.isMuted;
            state.localStream.getAudioTracks().forEach(t => t.enabled = !state.isMuted);
            updateMuteUI(state.isMuted);
        }
        
        function updateMuteUI(muted) {
            ui.call.muteIcon.setAttribute('data-lucide', muted ? 'mic-off' : 'mic');
            ui.call.muteBtn.style.background = muted ? 'linear-gradient(135deg, #e11d48, #f43f5e)' : '';
            ui.call.localStatus.textContent = muted ? 'Gedempt' : 'Microfoon aan';
            ui.call.localStatus.style.color = muted ? '#f43f5e' : '#10b981';
            ui.call.localInd.style.background = muted ? '#f43f5e' : '#10b981';
            lucide.createIcons();
        }
        
        function cleanupCall(notify = true) {
            clearTimeout(state.timeoutTimer);
            clearInterval(state.timerInterval);
            cancelAnimationFrame(state.animationId);
            stopQualityMonitor();
            
            if (notify && state.activeConn && state.activeConn.open) state.activeConn.send({ type: SIGNAL.HANGUP });
            if (state.currentCall) state.currentCall.close();
            if (state.localStream) state.localStream.getTracks().forEach(t => t.stop());
            
            // Cleanup Audio Nodes
            if (state.sourceNode) try { state.sourceNode.disconnect(); } catch(e) {}
            if (state.audioElement) { state.audioElement.pause(); state.audioElement.remove(); }
            if (state.audioCtx) state.audioCtx.close();
            
            resetCallState();
            ui.call.duration.textContent = '00:00';
            updateMuteUI(false);
            showScreen('main');
            ui.main.callBtn.disabled = false;
        }
        
        function resetCallState() {
            state.localStream = null; state.currentCall = null; state.isMuted = false;
            state.analyser = null; state.sourceNode = null; state.audioCtx = null; state.activeConn = null;
            state.isCallActive = false;
        }
        
        function disconnectFromNetwork() {
            cleanupCall(false);
            if (state.peer) { state.peer.destroy(); state.peer = null; }
            showScreen('lobby');
            ui.lobby.btn.disabled = false;
            ui.lobby.input.value = '';
        }
        
        // --- Event Listeners ---
        
        ui.lobby.btn.onclick = () => {
            const val = ui.lobby.input.value.trim();
            if (val && !/^[a-zA-Z0-9_-]{2,}$/.test(val)) { toast('Ongeldig ID', 'error'); return; }
            initPeer(val);
        };
        
        ui.main.copyBtn.onclick = () => { navigator.clipboard.writeText(ui.main.id.textContent); toast('Gekopieerd', 'success'); };
        ui.main.callBtn.onclick = () => { const id = ui.main.remoteInput.value.trim(); if (id) startCall(id); };
        ui.main.disconnectBtn.onclick = disconnectFromNetwork;
        ui.modal.accept.onclick = acceptCall;
        ui.modal.decline.onclick = declineCall;
        ui.call.muteBtn.onclick = toggleMute;
        ui.call.hangup.onclick = () => cleanupCall(true);
        
        // Handle Tab Visibility to prevent audio context suspension
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && state.audioCtx && state.audioCtx.state === 'suspended') {
                state.audioCtx.resume();
            }
        });
        
        document.onkeypress = (e) => {
            if (e.key === 'Enter') {
                if (ui.screens.lobby.classList.contains('active')) ui.lobby.btn.click();
                else if (ui.screens.main.classList.contains('active')) ui.main.callBtn.click();
            }
        };
        
        window.onbeforeunload = () => { cleanupCall(false); if(state.peer) state.peer.destroy(); };
    })();
    </script>
</body>
</html>
