<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communication Platform</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #111116;
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text: #f1f5f9;
            --text-dim: #64748b;
            --border: #22222b;
            --me: #0081ff; 
            --other: #1e1e26;
            --footer-h: 35px;
            --danger: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        body { height: 100vh; background: var(--bg); color: var(--text); display: flex; justify-content: center; overflow: hidden; }

        #app { 
            width: 100%; max-width: 450px; height: calc(100vh - var(--footer-h)); 
            background: var(--card); display: flex; flex-direction: column; position: relative; 
            border-left: 1px solid var(--border); border-right: 1px solid var(--border); 
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        #loader { 
            position: absolute; inset: 0; background: var(--bg); z-index: 1000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }
        #loader.active { display: flex; }
        .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #banScreen { 
            position: absolute; inset: 0; background: rgba(5, 5, 7, 0.98); 
            z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 40px; backdrop-filter: blur(15px); 
        }
        #banScreen.active { display: flex; }
        .ban-icon { font-size: 50px; color: var(--danger); margin-bottom: 20px; text-shadow: 0 0 20px rgba(255, 71, 87, 0.4); }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding: 25px; background: var(--card); z-index: 10; }
        .screen.active { display: flex; }

        h2 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 20px; color: #fff; }
        input { 
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border); 
            background: #050507; color: #fff; outline: none; margin-bottom: 12px; font-size: 15px; 
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        
        button { 
            width: 100%; padding: 14px; border-radius: 10px; border: none; 
            background: var(--accent); color: #000; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        button:hover { filter: brightness(1.2); }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: rgba(17, 17, 22, 0.8); backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border); z-index: 20; 
        }
        
        #messages { 
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 15px; padding: 20px; background-image: radial-gradient(#1e1e26 0.5px, transparent 0.5px); background-size: 20px 20px; 
        }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14.5px; line-height: 1.5; }
        .msg.me { align-self: flex-end; background: var(--me); color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--other); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        
        .input-area { 
            padding: 15px; background: rgba(17, 17, 22, 0.9); backdrop-filter: blur(10px); 
            border-top: 1px solid var(--border); display: flex; gap: 10px; 
        }
        #msgInput { margin: 0; background: #1a1a20; border-radius: 25px; padding: 12px 20px; flex: 1; color: white; border: 1px solid var(--border); outline: none; }
        #sendBtn { 
            width: 45px; height: 45px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; flex-shrink: 0; 
        }

        .q-bar { position: fixed; bottom: 0; width: 100%; height: var(--footer-h); background: #000; color: #555; font-size: 9px; display: flex; justify-content: center; align-items: center; letter-spacing: 2px; font-weight: bold; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="app">
    <div id="loader">
        <div class="spinner"></div>
        <div style="letter-spacing: 5px; font-size: 12px; color: var(--accent)">HYPERRUSH</div>
    </div>

    <div id="banScreen">
        <div class="ban-icon">⚠️</div>
        <h2 style="color: var(--danger);">ACCESS DENIED</h2>
        <p style="color: var(--text-dim); margin-bottom: 30px; font-size: 14px;">Protocol geschonden. Toegang permanent ingetrokken.</p>
        <button id="reconnectBtn" style="background: var(--danger); color: white; width: auto; padding: 10px 30px;">RECONNECT</button>
    </div>

    <div id="loginScreen" class="screen">
        <h2 style="margin-top: 40px;">Systeem Login</h2>
        <input id="email" type="email" placeholder="E-mailadres" />
        <input id="pass" type="password" placeholder="Wachtwoord" />
        <button id="loginBtn">SYSTEEM BETREDEN</button>
        <div id="toRegBtn" style="color:var(--text-dim); text-align:center; margin-top:15px; cursor:pointer; font-size:13px; text-decoration:underline;">Nieuw account aanmaken</div>
    </div>

    <div id="verifyScreen" class="screen">
        <h2>Verificatie</h2>
        <input id="vCode" type="number" placeholder="6-cijferige code" />
        <button id="confirmBtn">BEVESTIGEN</button>
    </div>

    <div id="nickScreen" class="screen">
        <h2>Identiteit</h2>
        <input id="nick" placeholder="Username" maxlength="12" />
        <button id="saveNick">SESSiE STARTEN</button>
    </div>

    <div id="chatScreen" class="screen" style="padding:0;">
        <div class="header">
            <div>
                <div style="font-size: 10px; color: var(--accent); font-weight: 900;">STATUS: ENCRYPTED</div>
                <div style="font-size: 14px; font-weight: bold;">Global Feed</div>
            </div>
            <button id="logoutBtn" style="width: auto; padding: 6px 15px; font-size: 11px; background: #222; color: #ff4d4d;">EXIT</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input id="msgInput" placeholder="Bericht typen..." autocomplete="off" />
            <button id="sendBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<div class="q-bar" id="qDisp">CONNECTING...</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://fahbqdajxnhswevdagdn.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhaGJxZGFqeG5oc3dldmRhZ2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NTEyODEsImV4cCI6MjA4NjEyNzI4MX0.UPgPxyaWBULjH4jL8UaSr6bJXTsFWWJRIYodHmXeVTI";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3qJc8pOaYGgal63I3cK0C_6rhEo86g54pYJ23Lt5-2mnbYBG6tiYdkSXhqFg0TQdj/exec";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });
    let currentUser = null;
    let currentChannel = null;

    const showLoader = (show) => document.getElementById('loader').classList.toggle('active', show);
    
    const nav = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('banScreen').classList.remove('active');
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
        showLoader(false);
    };

    function updateQuota() {
        fetch(GAS_URL).then(r => r.json()).then(d => {
            document.getElementById('qDisp').innerHTML = `QUOTA: ${d.used}/${d.limit} // SECURE_LINE: ACTIVE`;
        }).catch(() => {});
    }

    async function init() {
        showLoader(true);
        updateQuota();
        const token = localStorage.getItem('hr_at');
        if (token) {
            const { data } = await supabase.auth.getUser(token);
            if (data?.user) {
                currentUser = data.user;
                await checkProfile();
                return;
            }
        }
        nav('loginScreen');
    }

    async function checkProfile() {
        const { data } = await supabase.from('users').select('username, is_banned').eq('id', currentUser.id).maybeSingle();
        
        if (data?.is_banned) {
            document.getElementById('banScreen').classList.add('active');
            localStorage.removeItem('hr_at');
            showLoader(false);
            return;
        }

        if (data?.username) {
            nav('chatScreen');
            fetchMsgs();
            if (!currentChannel) {
                currentChannel = supabase.channel('global')
                    .on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, fetchMsgs)
                    .subscribe();
            }
        } else {
            nav('nickScreen');
        }
    }

    async function fetchMsgs() {
        const { data } = await supabase.from('messages').select('*, users(username)').order('created_at', {ascending:true});
        const box = document.getElementById('messages');
        box.innerHTML = (data || []).map(m => `
            <div class="msg ${m.user_id === currentUser.id ? 'me' : 'other'}">
                <div style="font-size:10px; color: var(--accent); font-weight:bold; margin-bottom:4px;">${m.users?.username || 'Anon'}</div>
                ${m.content}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('loginBtn').onclick = async () => {
        showLoader(true);
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (!error) {
            localStorage.setItem('hr_at', data.session.access_token);
            currentUser = data.user;
            await checkProfile();
        } else { showLoader(false); }
    };

    document.getElementById('toRegBtn').onclick = () => {
        const email = document.getElementById('email').value;
        if (!email.includes('@')) return;
        showLoader(true);
        fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "send", email }) })
            .then(() => nav('verifyScreen'));
    };

    document.getElementById('confirmBtn').onclick = async () => {
        showLoader(true);
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const code = document.getElementById('vCode').value;
        try {
            const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "verify", email, code }) });
            const res = await r.json();
            if (res.status === 200) {
                const { data } = await supabase.auth.signUp({ email, password: pass });
                const session = data?.session;
                if (session) {
                    localStorage.setItem('hr_at', session.access_token);
                    currentUser = data.user;
                    nav('nickScreen');
                } else {
                    const login = await supabase.auth.signInWithPassword({ email, password: pass });
                    if(login.data?.session) {
                        localStorage.setItem('hr_at', login.data.session.access_token);
                        currentUser = login.data.user;
                        nav('nickScreen');
                    }
                }
            } else { showLoader(false); }
        } catch(e) { showLoader(false); }
    };

    document.getElementById('saveNick').onclick = async () => {
        showLoader(true);
        const username = document.getElementById('nick').value;
        if (username.length < 2) { showLoader(false); return; }
        await supabase.from('users').upsert([{ id: currentUser.id, username, email: currentUser.email }]);
        await checkProfile();
    };

    document.getElementById('logoutBtn').onclick = async () => {
        showLoader(true);
        localStorage.removeItem('hr_at');
        if (currentChannel) {
            await supabase.removeChannel(currentChannel);
            currentChannel = null;
        }
        currentUser = null;
        document.getElementById('email').value = '';
        document.getElementById('pass').value = '';
        nav('loginScreen');
    };

    document.getElementById('reconnectBtn').onclick = () => {
        nav('loginScreen');
    };

    document.getElementById('sendBtn').onclick = async () => {
        const i = document.getElementById('msgInput');
        if (!i.value.trim() || !currentUser) return;
        const content = i.value; i.value = '';
        await supabase.from('messages').insert([{ content, user_id: currentUser.id }]);
        fetchMsgs();
        updateQuota();
    };

    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('sendBtn').click(); };

    init();
</script>
</body>
</html>
