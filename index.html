<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hyperrush Secure Chat v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #fff; --surface: #fff; --border: #e2e2e7;
            --text-main: #1c1c1e; --text-mute: #636366;
            --accent: #007aff; --danger: #ff3b30; --success: #34c759;
            --pad: 32px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent }
        body { height: 100dvh; background: #f2f2f7; color: var(--text-main); display: flex; justify-content: center; align-items: center; overflow: hidden }
        
        #app { width: 100%; max-width: 440px; height: 100%; position: relative; display: flex; flex-direction: column; background: var(--bg); box-shadow: 0 0 50px rgba(0, 0, 0, 0.1); }
        
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding: var(--pad); background: var(--bg) }
        .screen.active { display: flex; animation: fadeIn 0.3s ease }
        
        /* Connection Toast */
        #conn-status {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--success); transition: 0.3s; z-index: 99999;
        }
        #conn-status.offline { background: var(--danger); }

        /* UI Components */
        .title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 8px }
        .subtitle { color: var(--text-mute); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 32px }
        .input-field { width: 100%; background: #f2f2f7; border: 1px solid transparent; border-radius: 12px; padding: 16px; font-size: 16px; margin-bottom: 16px; outline: none }
        .btn { width: 100%; height: 56px; border-radius: 12px; border: 1px solid var(--border); font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px }
        .btn-accent { background: var(--text-main); color: #fff; border: none }
        
        #chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px 0 }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.4; position: relative }
        .message-me { align-self: flex-end; background: #e3f2fd; border: 1px solid #bbdefb; border-bottom-right-radius: 4px }
        .message-other { align-self: flex-start; background: #f5f5f7; border: 1px solid #e2e2e7; border-bottom-left-radius: 4px }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d1d6; margin-right: 8px }
        .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success) }
        
        #loader-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); z-index: 10000; display: none; align-items: center; justify-content: center }
        .spinner { width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite }
        @keyframes spin { to { transform: rotate(360deg) } }
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    </style>
</head>
<body>
    <div id="app">
        <div id="conn-status"></div>
        <div id="loader-overlay"><div class="spinner"></div></div>

        <div id="scr-start" class="screen active" style="text-align: center; justify-content: center;">
            <i data-lucide="shield-check" style="margin: 0 auto 20px; width: 64px; height: 64px;"></i>
            <h1 class="title">HRN Secure</h1>
            <p class="subtitle">End-to-End Encrypted</p>
            <button class="btn btn-accent" onclick="nav('scr-login')">Sign In</button>
            <button class="btn" style="margin-top: 12px" onclick="nav('scr-register')">Register</button>
        </div>

        <div id="scr-login" class="screen">
            <h1 class="title">Sign In</h1>
            <p class="subtitle" id="login-sub">Enter your credentials</p>
            <input id="l-email" class="input-field" type="email" placeholder="Email">
            <input id="l-pass" class="input-field" type="password" placeholder="Password">
            <button class="btn btn-accent" onclick="handleLogin()">Connect</button>
            <button class="btn" style="border:none; margin-top:8px" onclick="nav('scr-start')">Back</button>
        </div>

        <div id="scr-register" class="screen">
            <h1 class="title">Create Account</h1>
            <p class="subtitle">Join the secure network</p>
            <input id="r-name" class="input-field" placeholder="Full Name">
            <input id="r-email" class="input-field" type="email" placeholder="Email">
            <input id="r-pass" class="input-field" type="password" placeholder="Password (min 6 chars)">
            <button class="btn btn-accent" onclick="handleRegister()">Create</button>
            <button class="btn" style="border:none; margin-top:8px" onclick="nav('scr-start')">Back</button>
        </div>

        <div id="scr-lobby" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 class="title" style="font-size:20px; margin:0">Channels</h2>
                <div style="display:flex; gap:15px">
                    <i data-lucide="plus" onclick="nav('scr-create')" style="cursor:pointer"></i>
                    <i data-lucide="log-out" onclick="handleLogout()" style="cursor:pointer; color:var(--danger)"></i>
                </div>
            </div>
            <div id="room-list" style="flex:1; overflow-y:auto"></div>
        </div>

        <div id="scr-chat" class="screen">
            <div style="display:flex; align-items:center; padding-bottom:15px; border-bottom:1px solid var(--border); margin-bottom:15px">
                <i data-lucide="arrow-left" onclick="leaveChat()" style="cursor:pointer; margin-right:15px"></i>
                <div id="chat-hb" class="status-dot"></div>
                <h3 id="chat-title" style="flex:1; font-size:16px">---</h3>
            </div>
            <div id="chat-messages"></div>
            <div style="display:flex; gap:10px; padding-top:15px">
                <input id="chat-input" class="input-field" style="margin:0" placeholder="Secure message...">
                <button class="btn btn-accent" style="width:60px" onclick="sendMsg()"><i data-lucide="send"></i></button>
            </div>
        </div>

        <div id="scr-create" class="screen">
            <h1 class="title">New Channel</h1>
            <input id="c-name" class="input-field" placeholder="Channel Name">
            <input id="c-pass" class="input-field" placeholder="Password (Optional)">
            <button class="btn btn-accent" onclick="handleCreate()">Create</button>
            <button class="btn" style="border:none; margin-top:8px" onclick="nav('scr-lobby')">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

        const URL = "https://fahbqdajxnhswevdagdn.supabase.co",
              KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhaGJxZGFqeG5oc3dldmRhZ2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NTEyODEsImV4cCI6MjA4NjEyNzI4MX0.UPgPxyaWBULjH4jL8UaSr6bJXTsFWWJRIYodHmXeVTI",
              SALT = "H7a1lPjHvVBA5";
        
        const db = createClient(URL, KEY);
        let user = null, room = null, sub = null;
        let isOnline = navigator.onLine;

        // --- CORE FUNCTIONS ---
        const nav = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons();
        };

        const loader = (show) => document.getElementById('loader-overlay').style.display = show ? 'flex' : 'none';

        // --- HEARTBEAT & OFFLINE LOGIC ---
        const updateOnlineStatus = () => {
            isOnline = navigator.onLine;
            const bar = document.getElementById('conn-status');
            bar.className = isOnline ? '' : 'offline';
            if (!isOnline) {
                console.log("App is offline. Using cached data.");
            }
        };

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // Heartbeat interval om Supabase connectie te checken
        setInterval(async () => {
            if (isOnline) {
                const { error } = await db.from('profiles').select('count', { count: 'exact', head: true }).limit(1);
                if (error) updateOnlineStatus(false);
            }
        }, 30000);

        // --- AUTH LOGIC (Met LocalStorage cache) ---
        const handleLogin = async () => {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;

            if (!isOnline) {
                // Simpele offline check tegen cache
                const cachedUser = JSON.parse(localStorage.getItem('hrn_user'));
                if (cachedUser && cachedUser.email === email) {
                    user = cachedUser;
                    alert("Offline mode: Logged in with cached profile.");
                    nav('scr-lobby');
                    renderCachedRooms();
                    return;
                }
                alert("Offline: Connection required for first-time login.");
                return;
            }

            loader(true);
            const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
            loader(false);

            if (error) alert(error.message);
            else {
                user = data.user;
                localStorage.setItem('hrn_user', JSON.stringify(user));
                nav('scr-lobby');
                loadRooms();
            }
        };

        const handleRegister = async () => {
            if (!isOnline) return alert("Internet required to register.");
            const name = document.getElementById('r-name').value;
            const email = document.getElementById('r-email').value;
            const pass = document.getElementById('r-pass').value;

            loader(true);
            const { data, error } = await db.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
            if (!error) {
                await db.from('profiles').insert([{ id: data.user.id, full_name: name, email: email }]);
                alert("Account created! You can now sign in.");
                nav('scr-login');
            } else {
                alert(error.message);
            }
            loader(false);
        };

        const handleLogout = () => {
            db.auth.signOut();
            localStorage.removeItem('hrn_user');
            nav('scr-start');
        };

        // --- ROOMS & MESSAGES ---
        async function loadRooms() {
            if (!isOnline) return renderCachedRooms();
            const { data } = await db.from('rooms').select('*').eq('is_private', false);
            if (data) {
                localStorage.setItem('hrn_rooms', JSON.stringify(data));
                renderRooms(data);
            }
        }

        function renderRooms(rooms) {
            const list = document.getElementById('room-list');
            list.innerHTML = rooms.map(r => `
                <div class="btn" style="margin-bottom:10px; justify-content:space-between; padding:0 20px" onclick="openChat('${r.id}', '${r.name}')">
                    <span>${r.name}</span>
                    <i data-lucide="chevron-right" size="16"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderCachedRooms() {
            const cached = JSON.parse(localStorage.getItem('hrn_rooms') || '[]');
            renderRooms(cached);
        }

        window.openChat = async (id, name) => {
            room = id;
            document.getElementById('chat-title').innerText = name;
            nav('scr-chat');

            // Load cache first
            const cachedMsgs = JSON.parse(localStorage.getItem(`msgs_${id}`) || '[]');
            renderMessages(cachedMsgs);

            if (isOnline) {
                const { data } = await db.from('messages').select('*').eq('room_id', id).order('created_at', { ascending: true });
                if (data) {
                    localStorage.setItem(`msgs_${id}`, JSON.stringify(data));
                    renderMessages(data);
                }
                
                // Real-time subscription
                if (sub) db.removeChannel(sub);
                sub = db.channel(`room_${id}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${id}` }, (payload) => {
                    appendMessage(payload.new);
                }).subscribe(s => {
                    document.getElementById('chat-hb').classList.toggle('online', s === 'SUBSCRIBED');
                });
            }
        };

        function renderMessages(msgs) {
            const cont = document.getElementById('chat-messages');
            cont.innerHTML = msgs.map(m => createMsgHTML(m)).join('');
            cont.scrollTop = cont.scrollHeight;
        }

        function createMsgHTML(m) {
            let content = "Encrypted";
            try {
                const dec = CryptoJS.AES.decrypt(m.content, SALT).toString(CryptoJS.enc.Utf8);
                content = dec.split('|')[1] || dec;
            } catch(e) {}
            const isMe = m.user_id === user?.id;
            return `<div class="msg ${isMe ? 'message-me' : 'message-other'}">
                <div style="font-size:9px; font-weight:800; opacity:0.6; margin-bottom:4px">${m.user_name}</div>
                ${content}
            </div>`;
        }

        function appendMessage(m) {
            const cont = document.getElementById('chat-messages');
            cont.insertAdjacentHTML('beforeend', createMsgHTML(m));
            cont.scrollTop = cont.scrollHeight;
        }

        window.sendMsg = async () => {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if (!val) return;
            if (!isOnline) return alert("Cannot send messages while offline.");

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const crypt = CryptoJS.AES.encrypt(time + "|" + val, SALT).toString();

            input.value = "";
            await db.from('messages').insert([{ 
                room_id: room, 
                user_id: user.id, 
                user_name: user.user_metadata.full_name, 
                content: crypt 
            }]);
        };

        window.leaveChat = () => {
            if (sub) db.removeChannel(sub);
            nav('scr-lobby');
        };

        // Init
        updateOnlineStatus();
        const sessionUser = localStorage.getItem('hrn_user');
        if (sessionUser) {
            user = JSON.parse(sessionUser);
            nav('scr-lobby');
            loadRooms();
        }

        // Global exposure for HTML onclicks
        window.nav = nav;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.handleLogout = handleLogout;
        window.sendMsg = sendMsg;
        window.leaveChat = leaveChat;

    </script>
</body>
</html>
