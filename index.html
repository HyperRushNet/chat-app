<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hyperrush Secure Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #fff; --surface: #fff; --border: #e2e2e7; --text-main: #1c1c1e;
            --text-mute: #636366; --accent: #007aff; --danger: #ff3b30;
            --success: #34c759; --warning: #ff9500; --pad: 32px; --btn-subtle: #3a3a3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent }
        ::-webkit-scrollbar { width: 0px }
        body { height: 100dvh; background: #f2f2f7; color: var(--text-main); display: flex; justify-content: center; align-items: center; overflow: hidden }
        #app { width: 100%; max-width: 440px; height: 100%; position: relative; display: flex; flex-direction: column; background: var(--bg); box-shadow: 0 0 50px rgba(0, 0, 0, 0.1); overflow: hidden }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding: var(--pad); background: var(--bg) }
        .screen.active { display: flex; animation: fadeIn 0.3s ease }
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
        .center-content { justify-content: center; align-items: center; text-align: center }
        .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 32px; flex-shrink: 0; width: 100% }
        .title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; color: #000; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .subtitle { color: var(--text-mute); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 32px; display: block; }
        .input-field { width: 100%; background: #f2f2f7; border: 1px solid transparent; border-radius: 8px; padding: 16px; color: var(--text-main); font-size: 16px; outline: none; margin-bottom: 16px; transition: 0.2s }
        .input-field:focus { border-color: var(--accent); background: #fff }
        .btn { width: 100%; height: 56px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-main); font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s }
        .btn:active { opacity: 0.7 }
        .btn-accent { background: var(--text-main); color: #fff; border: none }
        .btn-cancel { border: none; margin-top: 12px; color: var(--text-mute); font-weight: 500; background: transparent; cursor: pointer; }
        #toast-container { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); z-index: 30000; width: 85%; pointer-events: none; display: flex; flex-direction: column; gap: 12px; }
        .toast-item { background: rgba(28,28,30,0.9); color: #fff; padding: 14px 20px; border-radius: 80px; font-weight: 500; font-size: 13px; text-align: center; animation: toastIn 0.3s ease-out forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-10px) } to { opacity: 1; transform: translateY(0) } }
        .overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: var(--pad) }
        .overlay.active { display: flex }
        .modal { width: 100%; background: #fff; border-radius: 16px; padding: 32px }
        .profile-info-stack { display: flex; flex-direction: column; gap: 20px; text-align: left; margin-bottom: 32px }
        .info-item label { display: block; font-size: 10px; font-weight: 700; color: var(--text-mute); text-transform: uppercase; margin-bottom: 6px }
        .info-item span { font-size: 15px; font-weight: 600; color: var(--text-main); display: block }
        #room-list, #chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; width: 100% }
        .room-card { padding: 20px; border-radius: 12px; background: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid var(--border); width: 100% }
        .msg { width: fit-content; max-width: 85%; padding: 8px 12px; border-radius: 12px; background: #f2f2f7; position: relative; font-size: 15px; line-height: 1.3; word-break: break-word; display: flex; flex-direction: column; }
        .msg.me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px }
        .msg-user { font-size: 10px; font-weight: 700; color: var(--text-mute); margin-bottom: 2px; text-transform: uppercase; cursor: pointer }
        .msg.me .msg-user { color: rgba(255,255,255,0.7) }
        .msg-time { font-size: 9px; opacity: 0.5; text-align: right; margin-top: 2px }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d1d6; transition: 0.3s }
        .status-dot.online { background: var(--success) }
        .status-dot.reconnecting { background: var(--warning); animation: pulse 1s infinite }
        @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
        #offline-overlay { position: absolute; inset: 0; background: rgba(255, 59, 48, 0.15); backdrop-filter: blur(12px); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px }
        #offline-overlay.active { display: flex }
        #loader-overlay { position: absolute; inset: 0; background: #fff; z-index: 20000; display: none; align-items: center; justify-content: center }
        #loader-overlay.active { display: flex }
        .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--text-main); border-radius: 50%; animation: spin .8s linear infinite }
        @keyframes spin { to { transform: rotate(360deg) } }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div id="app">
        <div id="loader-overlay"><div class="spinner"></div></div>
        <div id="toast-container"></div>
        <div id="offline-overlay">
            <i data-lucide="zap-off" size="48" style="color:var(--danger);margin-bottom:16px"></i>
            <h2 class="title" style="font-size:20px">Link Severed</h2>
            <p style="color:var(--text-mute);font-size:14px">Syncing secure tunnel...</p>
        </div>

        <div id="user-modal" class="overlay" onclick="window.closeUserModal()">
            <div class="modal" onclick="event.stopPropagation()">
                <h2 class="title" style="text-align:center">User Profile</h2>
                <div class="profile-info-stack">
                    <div class="info-item"><label>Full Name</label><span id="m-full-name">---</span></div>
                    <div class="info-item"><label>Email Address</label><span id="m-email">---</span></div>
                    <div class="info-item"><label>Member Since</label><span id="m-created-at">---</span></div>
                </div>
                <button class="btn btn-accent" onclick="window.closeUserModal()">Close</button>
            </div>
        </div>

        <div id="scr-start" class="screen active center-content">
            <div style="margin-bottom: 32px;"><i data-lucide="shield-check" size="56"></i></div>
            <h1 class="title">HRN Chat</h1>
            <p class="subtitle">Secure Messaging</p>
            <button class="btn btn-accent" onclick="window.nav('scr-login')" style="margin-bottom:12px">Sign In</button>
            <button class="btn" onclick="window.nav('scr-register')">Create Account</button>
        </div>

        <div id="scr-register" class="screen center-content">
            <h1 class="title">Sign Up</h1>
            <p class="subtitle">Join the network</p>
            <input type="text" id="r-name" class="input-field" placeholder="Full Name">
            <input type="email" id="r-email" class="input-field" placeholder="Email">
            <input type="password" id="r-pass" class="input-field" placeholder="Password">
            <button class="btn btn-accent" onclick="window.handleRegister()">Continue</button>
            <button onclick="window.nav('scr-start')" class="btn btn-cancel">Cancel</button>
        </div>

        <div id="scr-verify" class="screen center-content">
            <h1 class="title">Verify</h1>
            <p class="subtitle">Check your inbox</p>
            <input type="number" id="v-code" class="input-field text-center" placeholder="x x x x x x">
            <button class="btn btn-accent" onclick="window.handleVerify()">Confirm Identity</button>
        </div>

        <div id="scr-login" class="screen center-content">
            <h1 class="title">Welcome Back</h1>
            <p class="subtitle">Identify yourself</p>
            <input id="l-email" class="input-field" type="email" placeholder="Email">
            <input id="l-pass" type="password" class="input-field" placeholder="Password">
            <button class="btn btn-accent" onclick="window.handleLogin()">Sign In</button>
            <button class="btn btn-cancel" onclick="window.nav('scr-start')">Go Back</button>
        </div>

        <div id="scr-lobby" class="screen">
            <div class="header">
                <h1 class="title" style="font-size:22px; flex:1">Channels</h1>
                <div style="display:flex;gap:20px;align-items:center">
                    <i data-lucide="plus" size="24" class="clickable" onclick="window.nav('scr-create')"></i>
                    <i data-lucide="log-out" size="22" color="#ff3b30" class="clickable" onclick="window.handleLogout()"></i>
                </div>
            </div>
            <input id="search-bar" class="input-field" placeholder="Search channels..." oninput="window.filterRooms()">
            <div id="room-list"></div>
            <div style="display:flex;gap:12px;margin-top:auto;padding-top:20px">
                <input id="join-id" class="input-field" style="margin:0;flex:1" placeholder="Channel ID">
                <button class="btn btn-accent" style="width:80px" onclick="window.joinPrivate()">Join</button>
            </div>
        </div>

        <div id="scr-gate" class="screen center-content">
            <h1 class="title">Restricted</h1>
            <p class="subtitle">Access Key Required</p>
            <input id="gate-pass" type="password" class="input-field text-center" placeholder="••••••••">
            <button class="btn btn-accent" onclick="window.submitGate()">Unlock Access</button>
            <button class="btn btn-cancel" onclick="window.nav('scr-lobby')">Cancel</button>
        </div>

        <div id="scr-chat" class="screen">
            <div class="header">
                <div style="display:flex;align-items:center;gap:16px;flex:1;min-width:0">
                    <i data-lucide="chevron-left" size="24" onclick="window.leaveChat()" class="clickable"></i>
                    <div id="live-indicator" class="status-dot"></div>
                    <h2 id="chat-title" class="title" style="font-size:18px;margin-bottom:0;overflow:hidden;text-overflow:ellipsis">---</h2>
                </div>
                <i data-lucide="copy" size="20" color="#636366" onclick="window.copyId()" class="clickable"></i>
            </div>
            <div id="chat-messages"></div>
            <div style="display:flex;gap:12px;padding-top:20px">
                <textarea id="chat-input" class="input-field" style="margin:0;flex:1;height:52px;resize:none;padding-top:14px" placeholder="Type a message..."></textarea>
                <button id="btn-send" class="btn btn-accent" style="width:52px;height:52px;border-radius:14px" onclick="window.sendMsg()">
                    <i data-lucide="arrow-up"></i>
                </button>
            </div>
        </div>

        <div id="scr-create" class="screen center-content">
            <h1 class="title">New Channel</h1>
            <p class="subtitle">Set parameters</p>
            <input id="c-name" class="input-field" placeholder="Channel Name">
            <input id="c-pass" class="input-field" placeholder="Password (Optional)">
            <button class="btn btn-accent" onclick="window.handleCreate()">Create Channel</button>
            <button class="btn btn-cancel" onclick="window.nav('scr-lobby')">Cancel</button>
        </div>

        <div id="scr-success" class="screen center-content">
            <h1 class="title">Created</h1>
            <p class="subtitle">Your Channel ID</p>
            <div id="s-id" class="input-field text-center" style="cursor:pointer;border:1px solid var(--accent);color:var(--accent);font-family:monospace;font-weight:700" onclick="window.copySId()">---</div>
            <button class="btn btn-accent" onclick="window.enterCreated()">Enter Channel</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

        const URL = "https://fahbqdajxnhswevdagdn.supabase.co",
              KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhaGJxZGFqeG5oc3dldmRhZ2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NTEyODEsImV4cCI6MjA4NjEyNzI4MX0.UPgPxyaWBULjH4jL8UaSr6bJXTsFWWJRIYodHmXeVTI",
              GAS_URL = "https://script.google.com/macros/s/AKfycbwoHBjaZgzAiv0G9iKfKriKMPxA9Zjm0Fg9dQjtuJuCntuSe3oPP9uvxu1LzwF8aPER/exec",
              SALT = "H7a1lPjHvVBA5",
              db = createClient(URL, KEY);

        let user, room, roomName, sub, allRooms = [], tempReg = {}, lastCreated, wasOffline = false, isWSConnected = false;

        // --- STABIELE WS CLEANUP ---
        const forceKillWS = async () => {
            isWSConnected = false;
            if (document.getElementById('live-indicator')) document.getElementById('live-indicator').className = 'status-dot';
            if (sub) {
                try {
                    await sub.unsubscribe();
                    await db.removeChannel(sub);
                } catch (e) {}
                sub = null;
            }
        };

        // --- UI HELPERS ---
        window.nav = id => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons();
        };

        window.toast = msg => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast-item';
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
        };

        window.setLoading = isLoading => document.getElementById('loader-overlay').classList.toggle('active', isLoading);

        // --- CRYPTO LOGIC ---
        const escapeHTML = (s) => s ? s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : "";
        const crypt = (t) => {
            const now = new Date();
            const timeStr = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}]`;
            return CryptoJS.AES.encrypt(timeStr + t, SALT).toString();
        };
        const decryptData = (c) => {
            try {
                const raw = CryptoJS.AES.decrypt(c, SALT).toString(CryptoJS.enc.Utf8);
                const end = raw.indexOf(']');
                return { time: raw.substring(1, end), text: escapeHTML(raw.substring(end + 1)) };
            } catch { return { time: "??:??", text: "Encrypted Data" }; }
        };

        // --- AUTH CHANGE (FIX: SLUIT GROEP NIET BIJ TAB FOCUS) ---
        db.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                user = session.user;
                const activeScr = document.querySelector('.screen.active').id;
                if (['scr-start', 'scr-login', 'scr-register', 'scr-verify'].includes(activeScr)) {
                    window.nav('scr-lobby');
                    loadRooms();
                }
            } else {
                user = null;
                window.nav('scr-start');
            }
        });

        // --- EXACT REGISTER LOGIC ---
        window.handleRegister = async () => {
            const n = document.getElementById('r-name').value.trim();
            const e = document.getElementById('r-email').value.trim();
            const p = document.getElementById('r-pass').value.trim();
            if(!n || !e || !p) return window.toast("All fields are required");
            tempReg = { n, e, p };
            window.setLoading(true);
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "send", email: e }) });
                window.toast("Verification code sent");
                window.nav('scr-verify');
            } catch(e) { window.toast("Connection error"); } 
            finally { window.setLoading(false); }
        };

        window.handleVerify = async () => {
            const code = document.getElementById('v-code').value;
            if(!code) return window.toast("Enter code");
            window.setLoading(true);
            const { data, error } = await db.auth.signUp({
                email: tempReg.e, password: tempReg.p, options: { data: { full_name: tempReg.n } }
            });
            if(!error) {
                await db.from('profiles').insert([{ id: data.user.id, full_name: tempReg.n, email: tempReg.e }]);
                user = data.user;
                window.nav('scr-lobby');
                window.loadRooms();
            } else { window.toast(error.message); }
            window.setLoading(false);
        };

        window.handleLogin = async () => {
            const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
            if(!e || !p) return window.toast("Enter credentials");
            window.setLoading(true);
            const { data, error } = await db.auth.signInWithPassword({ email: e, password: p });
            window.setLoading(false);
            if(!error) {
                user = data.user;
                window.nav('scr-lobby');
                window.loadRooms();
            } else { window.toast("Authentication failed"); }
        };

        window.handleLogout = () => db.auth.signOut();

        // --- CHAT LOGIC ---
        window.loadRooms = async () => {
            const { data } = await db.from('rooms').select('*').eq('is_private', false).order('created_at', { ascending: false });
            allRooms = data || [];
            renderRoomList(allRooms);
        };

        const renderRoomList = list => {
            document.getElementById('room-list').innerHTML = list.map(r => `
                <div class="room-card" onclick="window.joinAttempt('${r.id}', '${escapeHTML(r.name)}', '${r.password}')">
                    <span style="font-weight:700;">${escapeHTML(r.name)}</span>
                    <i data-lucide="${(r.password && r.password !== 'null') ? 'lock' : 'chevron-right'}" size="18" color="#636366"></i>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.filterRooms = () => {
            const q = document.getElementById('search-bar').value.toLowerCase();
            renderRoomList(allRooms.filter(r => r.name.toLowerCase().includes(q)));
        };

        window.joinPrivate = async () => {
            const id = document.getElementById('join-id').value.trim();
            if(!id) return;
            window.setLoading(true);
            const { data } = await db.from('rooms').select('*').eq('id', id).single();
            window.setLoading(false);
            if(data) window.joinAttempt(data.id, data.name, data.password);
            else window.toast("Channel not found");
        };

        window.joinAttempt = (id, name, p) => {
            if(p && p !== "null") {
                window.pendingRoom = { id, name, pass: p };
                window.nav('scr-gate');
            } else { window.openVault(id, name); }
        };

        window.submitGate = () => {
            if(document.getElementById('gate-pass').value === window.pendingRoom.pass) {
                window.openVault(window.pendingRoom.id, window.pendingRoom.name);
                document.getElementById('gate-pass').value = '';
            } else { window.toast("Invalid key"); }
        };

        window.openVault = async (id, name) => {
            if (!navigator.onLine) return;
            await forceKillWS();
            room = id; roomName = name;
            document.getElementById('chat-title').innerText = name;
            window.nav('scr-chat');

            const { data } = await db.from('messages').select('*').eq('room_id', id).order('created_at', { ascending: true });
            const box = document.getElementById('chat-messages');
            box.innerHTML = (data || []).map(m => renderMsg(m)).join('');
            box.scrollTop = box.scrollHeight;

            sub = db.channel(`room_${id}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${id}` }, p => {
                box.insertAdjacentHTML('beforeend', renderMsg(p.new));
                box.scrollTop = box.scrollHeight;
            }).subscribe(s => {
                isWSConnected = (s === 'SUBSCRIBED');
                const dot = document.getElementById('live-indicator');
                if(dot) dot.className = 'status-dot ' + (isWSConnected ? 'online' : 'reconnecting');
            });
        };

        const renderMsg = m => {
            const d = decryptData(m.content);
            return `<div class="msg ${m.user_id === user.id ? 'me' : ''}">
                <span class="msg-user" onclick="window.showUserInfo('${m.user_id}')">${m.user_name}</span>
                <div>${d.text}</div>
                <span class="msg-time">${d.time}</span>
            </div>`;
        };

        window.sendMsg = async () => {
            if (!isWSConnected) return;
            const i = document.getElementById('chat-input'), v = i.value.trim();
            if(!v) return;
            i.value = '';
            await db.from('messages').insert([{
                room_id: room, user_id: user.id, user_name: user.user_metadata.full_name, content: crypt(v)
            }]);
        };

        window.showUserInfo = async (userId) => {
            window.setLoading(true);
            const { data } = await db.from('profiles').select('*').eq('id', userId).single();
            window.setLoading(false);
            if (data) {
                const date = new Date(data.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                document.getElementById('m-full-name').innerText = data.full_name;
                document.getElementById('m-email').innerText = data.email;
                document.getElementById('m-created-at').innerText = date;
                document.getElementById('user-modal').classList.add('active');
            }
        };

        window.closeUserModal = () => document.getElementById('user-modal').classList.remove('active');
        window.leaveChat = async () => { await forceKillWS(); room = null; window.nav('scr-lobby'); };
        window.copyId = () => { navigator.clipboard.writeText(room); window.toast("ID Copied"); };
        window.copySId = () => { navigator.clipboard.writeText(lastCreated.id); window.toast("ID Copied"); };

        window.handleCreate = async () => {
            const n = document.getElementById('c-name').value.trim(), p = document.getElementById('c-pass').value;
            if(!n) return;
            window.setLoading(true);
            const { data } = await db.from('rooms').insert([{ name: n, password: p || null, is_private: false, created_by: user.id }]).select();
            window.setLoading(false);
            if(data) { lastCreated = data[0]; document.getElementById('s-id').innerText = lastCreated.id; window.nav('scr-success'); }
        };

        window.enterCreated = () => window.openVault(lastCreated.id, lastCreated.name);

        // --- CONNECTION MONITOR ---
        setInterval(async () => {
            const isOnline = navigator.onLine;
            const overlay = document.getElementById('offline-overlay');
            if (!isOnline && !wasOffline) {
                overlay.classList.add('active');
                await forceKillWS();
                wasOffline = true;
            } else if (isOnline && wasOffline) {
                overlay.classList.remove('active');
                wasOffline = false;
                if (user && room && roomName) window.openVault(room, roomName);
            }
        }, 500);

        lucide.createIcons();
    </script>
</body>
</html>
