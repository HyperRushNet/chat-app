<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hyperrush Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #fcfcfd;
            --surface: #ffffff;
            --border: #eeeef2;
            --text-main: #1a1a1e;
            --text-mute: #8e8e93;
            --accent: #007aff;
            --danger: #ff3b30;
            --success: #34c759;
            --pad: 24px;
        }

        ::-webkit-scrollbar { width: 0px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { height: 100dvh; background: #f4f4f7; color: var(--text-main); display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 440px; height: 100%; position: relative; display: flex; flex-direction: column; background: var(--bg); }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding: var(--pad); }
        .screen.active { display: flex; animation: fadeIn 0.4s ease; position: relative; flex: 1; height: 100%; }
        .center-content { justify-content: center; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .break-text { word-break: break-all; overflow-wrap: break-word; }

        /* Loader & Toasts */
        #loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); z-index: 20000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        #loader-overlay.active { display: flex; }
        .spinner { width: 24px; height: 24px; border: 1px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #toast-container { position: fixed; top: 32px; left: 50%; transform: translateX(-50%); z-index: 30000; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; width: 85%; }
        .toast-item { background: #1a1a1e; color: white; padding: 10px 18px; border-radius: 20px; font-weight: 600; font-size: 12px; animation: toastIn 0.3s ease forwards; pointer-events: auto; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Typography */
        .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 24px; flex-shrink: 0; gap: 12px; }
        .title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: #000; }
        .subtitle { color: var(--text-mute); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; display: block; }
        .center-text { text-align: center; }

        /* Inputs & Buttons */
        .input-field { width: 100%; background: #f2f2f7; border: 1px solid transparent; border-radius: 12px; padding: 14px 16px; color: var(--text-main); font-size: 15px; outline: none; margin-bottom: 12px; transition: 0.2s; }
        .input-field:focus { border-color: var(--accent); background: #fff; }
        
        .btn { width: 100%; height: 52px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text-main); font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); background: #f9f9fb; }
        .btn-accent { border-color: var(--accent); color: var(--accent); }
        .btn-cancel { border: none; margin-top: 8px; color: var(--text-mute); }

        /* Room List */
        #room-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .room-card { width: 100%; padding: 16px; border-radius: 12px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid var(--border); min-width: 0; transition: 0.2s; }
        .room-card span { font-weight: 600; font-size: 15px; color: #333; flex: 1; min-width: 0; margin-right: 12px; }

        /* Chat UI */
        #chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 4px 0; }
        .msg { max-width: 80%; padding: 12px 14px; border-radius: 16px; border: 1px solid var(--border); background: #fff; position: relative; font-size: 14px; line-height: 1.4; }
        .msg-text { white-space: pre-wrap; word-break: break-all; overflow-wrap: anywhere; }
        .msg.me { align-self: flex-end; background: var(--accent); color: white; border: none; border-bottom-right-radius: 4px; }
        .msg-user { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 4px; display: block; text-transform: uppercase; min-width: 0; cursor: pointer; }
        .msg.me .msg-user { color: rgba(255,255,255,0.8); }
        .msg-time { font-size: 8px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }

        /* Chat Controls */
        .chat-header-group { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .chat-input-container { display: flex; gap: 10px; padding-top: 16px; }
        #chat-input { margin: 0; min-height: 48px; height: 48px; resize: none; padding-top: 14px; }
        .btn-send { width: 48px; height: 48px; flex-shrink: 0; border-radius: 50%; }

        /* Lobby Controls */
        .lobby-header-icons { display: flex; gap: 16px; flex-shrink: 0; }
        .lobby-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
        .join-group { display: flex; gap: 8px; }
        #join-id { margin: 0; flex: 1; }
        .btn-join { width: 80px; height: 48px; flex-shrink: 0; }

        /* Overlays & Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.1); backdrop-filter: blur(4px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 24px; }
        .overlay.active { display: flex; }
        .modal { width: 100%; max-width: 340px; background: #fff; border-radius: 20px; padding: 24px; border: 1px solid var(--border); }
        
        .name-popup-label { margin-bottom: 12px; }
        #name-popup-text { font-size: 16px; font-weight: 600; color: var(--text-main); text-align: center; margin-bottom: 20px; }

        /* Profile Modal */
        #m-user-name { font-size: 18px; margin-bottom: 4px; }
        .profile-subtitle { margin-bottom: 20px; }
        .profile-id-box { background: #f2f2f7; padding: 16px; border-radius: 12px; margin-bottom: 20px; }
        .id-label { font-size: 9px; color: var(--text-mute); text-transform: uppercase; }
        #m-user-id { font-size: 11px; font-family: monospace; color: var(--text-main); display: block; margin-top: 4px; }

        /* Create Room Screen */
        .toggle-container { display: flex; align-items: center; justify-content: space-between; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; cursor: pointer; background: #f9f9fb; }
        .toggle-label { font-size: 14px; font-weight: 600; }
        .toggle-switch { width: 34px; height: 18px; background: #e2e2e7; border-radius: 20px; position: relative; }
        .toggle-switch::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .toggle-active .toggle-switch { background: var(--success); }
        .toggle-active .toggle-switch::after { left: 18px; }

        /* Success Screen */
        #s-id { cursor: pointer; font-family: monospace; text-align: center; background: #fff; border: 1px dashed var(--accent); color: var(--accent); min-height: 48px; }

        /* Misc */
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #d1d1d6; flex-shrink: 0; }
        .status-dot.online { background: var(--success); }
        .clickable { cursor: pointer; }
        .shield-icon { margin: 0 auto 16px auto; }
        .flex-shrink-0 { flex-shrink: 0; }
        .flex-1 { flex: 1; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="spinner"></div>
</div>

<div id="toast-container"></div>

<div id="name-modal" class="overlay" onclick="closeNameModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <p class="subtitle center-text name-popup-label">Identifier</p>
        <div id="name-popup-text" class="break-text">---</div>
        <button class="btn" onclick="closeNameModal()">Close</button>
    </div>
</div>

<div id="app">
    <div id="user-modal" class="overlay" onclick="closeUserModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 class="title center-text truncate" id="m-user-name">Profile</h2>
            <p class="subtitle center-text profile-subtitle">Identity Details</p>
            <div class="profile-id-box">
                <span class="id-label">Unique ID</span>
                <span id="m-user-id" class="break-text">---</span>
            </div>
            <button class="btn" onclick="closeUserModal()">Back</button>
        </div>
    </div>

    <div id="scr-start" class="screen active center-content">
        <i data-lucide="shield-check" size="48" color="#007aff" class="shield-icon"></i>
        <h1 class="title truncate">Hyperrush</h1>
        <p class="subtitle">Secure Node</p>
        <button class="btn btn-accent" onclick="nav('scr-login')" style="margin-bottom:10px;">Sign In</button>
        <button class="btn" onclick="nav('scr-register')">Sign Up</button>
    </div>

    <div id="scr-register" class="screen center-content">
        <h1 class="title">Sign Up</h1>
        <p class="subtitle">Create account</p>
        <input type="text" id="r-name" class="input-field" placeholder="Full Name">
        <input type="email" id="r-email" class="input-field" placeholder="Email Address">
        <input type="password" id="r-pass" class="input-field" placeholder="Password">
        <button class="btn btn-accent" onclick="handleRegister()">Continue</button>
        <button onclick="nav('scr-start')" class="btn btn-cancel">Cancel</button>
    </div>

    <div id="scr-login" class="screen center-content">
        <h1 class="title">Sign In</h1>
        <p class="subtitle">Access vault</p>
        <input type="email" id="l-email" class="input-field" placeholder="Email Address">
        <input type="password" id="l-pass" class="input-field" placeholder="Password">
        <button class="btn btn-accent" onclick="handleLogin()">Unlock</button>
        <button onclick="nav('scr-start')" class="btn btn-cancel">Go Back</button>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="header">
            <h1 class="title truncate flex-1" style="font-size: 20px;">Rooms</h1>
            <div class="lobby-header-icons">
                <i data-lucide="plus-circle" size="22" color="#1a1a1e" class="clickable" onclick="nav('scr-create')"></i>
                <i data-lucide="log-out" size="20" color="#ff3b30" class="clickable" onclick="handleLogout()"></i>
            </div>
        </div>
        <input type="text" id="search-bar" class="input-field" placeholder="Search..." oninput="filterRooms()">
        <div id="room-list"></div>
        <div class="lobby-footer">
            <div class="join-group">
                <input type="text" id="join-id" class="input-field" placeholder="Room ID">
                <button class="btn btn-accent btn-join" onclick="joinPrivate()">Join</button>
            </div>
        </div>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header">
            <div class="chat-header-group">
                <i data-lucide="arrow-left" size="20" onclick="leaveChat()" class="clickable flex-shrink-0"></i>
                <div id="live-indicator" class="status-dot"></div>
                <h2 id="chat-title" class="truncate flex-1" style="font-size: 16px; font-weight: 700;">---</h2>
            </div>
            <i data-lucide="link" size="18" color="#8e8e93" class="clickable flex-shrink-0" onclick="copyId()"></i>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-container">
            <textarea id="chat-input" class="input-field" placeholder="Message..."></textarea>
            <button class="btn btn-accent btn-send" onclick="sendMsg()"><i data-lucide="send" size="18"></i></button>
        </div>
    </div>

    <div id="scr-verify" class="screen center-content">
        <h1 class="title">Verify</h1>
        <p class="subtitle">Code from email</p>
        <input type="number" id="v-code" class="input-field text-center" placeholder="000000">
        <button class="btn btn-accent" onclick="handleVerify()">Confirm</button>
    </div>

    <div id="scr-gate" class="screen center-content">
        <h1 class="title truncate">Password</h1>
        <p class="subtitle">Restricted</p>
        <input type="password" id="gate-pass" class="input-field text-center" placeholder="Password">
        <button class="btn btn-accent" onclick="submitGate()">Unlock</button>
    </div>

    <div id="scr-create" class="screen center-content">
        <h1 class="title">New Room</h1>
        <p class="subtitle">Configure</p>
        <input type="text" id="c-name" class="input-field" placeholder="Room Name">
        <input type="password" id="c-pass" class="input-field" placeholder="Password (Optional)">
        <div id="private-toggle" class="toggle-container" onclick="this.classList.toggle('toggle-active')">
            <span class="toggle-label">Private</span>
            <div class="toggle-switch"></div>
        </div>
        <button class="btn btn-accent" onclick="handleCreate()">Create</button>
        <button onclick="nav('scr-lobby')" class="btn btn-cancel">Cancel</button>
    </div>

    <div id="scr-success" class="screen center-content">
        <h1 class="title">Ready</h1>
        <p class="subtitle">Room ID</p>
        <div class="input-field break-text" id="s-id" onclick="copySId()">---</div>
        <button class="btn btn-accent" onclick="enterCreated()">Enter</button>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const URL = "https://fahbqdajxnhswevdagdn.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhaGJxZGFqeG5oc3dldmRhZ2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NTEyODEsImV4cCI6MjA4NjEyNzI4MX0.UPgPxyaWBULjH4jL8UaSr6bJXTsFWWJRIYodHmXeVTI";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwoHBjaZgzAiv0G9iKfKriKMPxA9Zjm0Fg9dQjtuJuCntuSe3oPP9uvxu1LzwF8aPER/exec";
    const SALT = "H7a1lPjHvVBA5";

    const db = createClient(URL, KEY);
    let user = null, room = null, sub = null, allRooms = [], tempReg = {}, lastCreated = null;

    // --- Interaction ---
    let pressTimer;
    window.startLongPress = (e) => {
        const text = e.target.innerText;
        if(!text || text === "---") return;
        pressTimer = window.setTimeout(() => {
            document.getElementById('name-popup-text').innerText = text;
            document.getElementById('name-modal').classList.add('active');
        }, 600);
        const stop = () => clearTimeout(pressTimer);
        e.target.addEventListener('mouseup', stop, {once:true});
        e.target.addEventListener('touchend', stop, {once:true});
    };
    window.closeNameModal = () => document.getElementById('name-modal').classList.remove('active');

    window.toast = (msg) => {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast-item';
        t.innerText = msg;
        container.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2500);
    };

    window.setLoading = (isLoading) => {
        document.getElementById('loader-overlay').classList.toggle('active', isLoading);
    };

    const escapeHTML = (s) => s ? s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : "";
    
    const crypt = (t) => {
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}]`;
        return CryptoJS.AES.encrypt(timeStr + t, SALT).toString();
    };

    const decryptData = (c) => {
        try {
            const raw = CryptoJS.AES.decrypt(c, SALT).toString(CryptoJS.enc.Utf8);
            if(raw.startsWith('[')) {
                const end = raw.indexOf(']');
                return { time: raw.substring(1, end), text: escapeHTML(raw.substring(end + 1)) };
            }
            return { time: "--:--", text: escapeHTML(raw) };
        } catch { return { time: "??:??", text: "[ENCRYPTED]" }; }
    };

    window.nav = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        lucide.createIcons();
    };

    window.handleLogout = async () => {
        window.setLoading(true);
        await db.auth.signOut(); user = null;
        window.setLoading(false);
        window.nav('scr-start');
    };

    window.handleRegister = async () => {
        tempReg = { n: document.getElementById('r-name').value, e: document.getElementById('r-email').value, p: document.getElementById('r-pass').value };
        if(!tempReg.n || !tempReg.e || !tempReg.p) return window.toast("Fill all");
        window.setLoading(true);
        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "send", email: tempReg.e }) });
            window.nav('scr-verify');
        } catch(e) { window.toast("Error"); } finally { window.setLoading(false); }
    };

    window.handleVerify = async () => {
        window.setLoading(true);
        const { data, error } = await db.auth.signUp({ email: tempReg.e, password: tempReg.p, options: { data: { full_name: tempReg.n } } });
        window.setLoading(false);
        if(!error) { user = data.user; window.nav('scr-lobby'); window.loadRooms(); } else window.toast(error.message);
    };

    window.handleLogin = async () => {
        const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
        if(!e || !p) return window.toast("Fill all");
        window.setLoading(true);
        const { data, error } = await db.auth.signInWithPassword({ email: e, password: p });
        window.setLoading(false);
        if(!error) { user = data.user; window.nav('scr-lobby'); window.loadRooms(); } else window.toast("Failed");
    };

    window.loadRooms = async () => {
        window.setLoading(true);
        const { data } = await db.from('rooms').select('*').eq('is_private', false).order('created_at', { ascending: false });
        allRooms = data || [];
        renderRoomList(allRooms);
        window.setLoading(false);
    };

    const renderRoomList = (list) => {
        const container = document.getElementById('room-list');
        container.innerHTML = list.map(r => `
            <div class="room-card" onclick="joinAttempt('${r.id}', '${escapeHTML(r.name)}', '${r.password}')">
                <span class="truncate">${escapeHTML(r.name)}</span>
                <i data-lucide="${(r.password && r.password !== 'null') ? 'lock' : 'chevron-right'}" size="16" color="#8e8e93" class="flex-shrink-0"></i>
            </div>
        `).join('');
        lucide.createIcons();
    };

    window.filterRooms = () => {
        const q = document.getElementById('search-bar').value.toLowerCase();
        renderRoomList(allRooms.filter(r => r.name.toLowerCase().includes(q)));
    };

    window.joinAttempt = (id, name, p) => {
        if(p && p !== "null" && p !== "") {
            window.pendingRoom = { id, name, pass: p };
            window.nav('scr-gate');
        } else { window.openVault(id, name); }
    };

    window.submitGate = () => {
        if(document.getElementById('gate-pass').value === window.pendingRoom.pass) {
            window.openVault(window.pendingRoom.id, window.pendingRoom.name);
        } else { window.toast("Wrong"); }
    };

    window.joinPrivate = async () => {
        const id = document.getElementById('join-id').value;
        if(!id) return;
        window.setLoading(true);
        const { data } = await db.from('rooms').select('*').eq('id', id).single();
        window.setLoading(false);
        if(data) window.joinAttempt(data.id, data.name, data.password);
    };

    window.openVault = async (id, name) => {
        window.setLoading(true);
        if(sub) { await db.removeChannel(sub); sub = null; }
        room = id; 
        document.getElementById('chat-title').innerText = name;
        const indicator = document.getElementById('live-indicator');
        const { data } = await db.from('messages').select('*').eq('room_id', id).order('created_at', { ascending: true });
        const box = document.getElementById('chat-messages');
        box.innerHTML = (data || []).map(m => renderMsg(m)).join('');
        box.scrollTop = box.scrollHeight;
        sub = db.channel(`room_${id}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${id}` }, p => { 
                box.insertAdjacentHTML('beforeend', renderMsg(p.new)); 
                box.scrollTop = box.scrollHeight; 
            })
            .subscribe((status) => { indicator.classList.toggle('online', status === 'SUBSCRIBED'); });
        window.setLoading(false);
        window.nav('scr-chat');
    };

    const renderMsg = (m) => {
        const d = decryptData(m.content);
        return `<div class="msg ${m.user_id === user.id ? 'me' : 'them'}">
            <span class="msg-user truncate" onclick="showUserInfo('${m.user_id}')">${m.user_name}</span>
            <div class="msg-text">${d.text}</div>
            <span class="msg-time">${d.time}</span>
        </div>`;
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        if(!i.value.trim()) return;
        const val = i.value; i.value = '';
        await db.from('messages').insert([{ room_id: room, user_id: user.id, user_name: user.user_metadata.full_name, content: crypt(val) }]);
    };

    window.showUserInfo = async (userId) => {
        window.setLoading(true);
        const { data } = await db.from('profiles').select('*').eq('id', userId).single();
        window.setLoading(false);
        if (data) {
            document.getElementById('m-user-name').innerText = data.full_name;
            document.getElementById('m-user-id').innerText = userId;
            document.getElementById('user-modal').classList.add('active');
        }
    };

    window.closeUserModal = () => document.getElementById('user-modal').classList.remove('active');
    window.leaveChat = async () => { 
        if(sub) { await db.removeChannel(sub); sub = null; }
        window.nav('scr-lobby'); 
    };

    window.handleCreate = async () => {
        const n = document.getElementById('c-name').value, p = document.getElementById('c-pass').value;
        const isPriv = document.getElementById('private-toggle').classList.contains('toggle-active');
        if(!n) return;
        window.setLoading(true);
        const { data } = await db.from('rooms').insert([{ name: n, password: p || null, is_private: isPriv, created_by: user.id }]).select();
        window.setLoading(false);
        if(data) { lastCreated = data[0]; document.getElementById('s-id').innerText = lastCreated.id; window.nav('scr-success'); }
    };

    window.copyId = () => { navigator.clipboard.writeText(room); window.toast("ID Copied"); };
    window.copySId = () => { navigator.clipboard.writeText(lastCreated.id); window.toast("ID Copied"); };
    window.enterCreated = () => window.openVault(lastCreated.id, lastCreated.name);

    lucide.createIcons();
</script>
</body>
</html>
