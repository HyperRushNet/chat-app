<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperRush Private Chat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        body{height:100vh;background:#0f0f14;color:#fff;display:flex;justify-content:center;align-items:center;overflow:hidden}
        #app{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;border-left:1px solid #222;border-right:1px solid #222;position:relative;background:#0f0f14}
        
        /* Screens */
        #loginScreen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:15px;padding:30px}
        #chatScreen{flex:1;display:none;flex-direction:column;height:100%}

        /* UI Elements */
        input{width:100%;padding:14px;border-radius:12px;border:none;background:#18181f;color:#fff;font-size:16px;outline:none}
        button{width:100%;padding:14px;border-radius:12px;border:none;background:#7dd3fc;color:#0f0f14;font-weight:bold;cursor:pointer;transition:0.2s}
        button:hover{background:#38bdf8}
        button:disabled{opacity:0.5;cursor:not-allowed}

        /* Messages */
        #messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
        .msg{padding:10px 14px;border-radius:15px;max-width:85%;word-wrap:break-word;line-height:1.4}
        .me{background:#2563eb;align-self:flex-end;border-bottom-right-radius:2px}
        .other{background:#222;align-self:flex-start;border-bottom-left-radius:2px}
        .time{display:block;font-size:10px;margin-top:5px;opacity:0.6}

        /* Input Bar */
        #inputBar{padding:15px;background:#0f0f14;border-top:1px solid #222;display:flex;gap:10px}
        
        /* Overlays */
        #banOverlay{position:absolute;inset:0;background:rgba(0,0,0,0.95);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:99;text-align:center;color:#ff5555}
    </style>
</head>
<body>

<div id="app">
    <div id="banOverlay"><h1>VERBANNEN</h1><p>Je hebt geen toegang meer.</p></div>

    <div id="loginScreen">
        <h2 style="margin-bottom:10px">HyperRush Chat</h2>
        <input id="emailInput" type="email" placeholder="E-mailadres..." />
        <button id="loginBtn">Verstuur Login Link</button>
        <p id="loginInfo" style="font-size:13px; color:#aaa"></p>
    </div>

    <div id="chatScreen">
        <div id="messages"></div>
        <div id="inputBar">
            <input id="textInput" placeholder="Typ een bericht..." autocomplete="off" />
            <button id="sendBtn" style="width:auto">Verzend</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // --- CONFIG ---
    const SUPABASE_URL = "https://zhqcdpkobxkbfqhkjhng.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpocWNkcGtvYnhrYmZxaGtqaG5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NDg3NTAsImV4cCI6MjA4NjExNDc1MH0.zcZyVuzMZ_l_2QBElxvx61AFNVM1HCmUgpfFatsbZPg";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginScreen = document.getElementById("loginScreen");
    const chatScreen = document.getElementById("chatScreen");
    const messagesDiv = document.getElementById("messages");
    const textInput = document.getElementById("textInput");
    const loginBtn = document.getElementById("loginBtn");
    const sendBtn = document.getElementById("sendBtn");
    const loginInfo = document.getElementById("loginInfo");

    let user = null;

    // 1. Check Sessie & Los 401 op
    async function checkSession() {
        const { data: { session }, error } = await supabase.auth.getSession();
        
        if (error) {
            console.warn("Oude sessie gevonden, we loggen je uit voor een schone start.");
            await supabase.auth.signOut();
            return;
        }

        if (session) {
            user = session.user;
            await setupUser();
        }

        // Luister naar magic link kliks
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                user = session.user;
                setupUser();
            } else {
                loginScreen.style.display = "flex";
                chatScreen.style.display = "none";
            }
        });
    }

    // 2. Registratie & Ban Check
    async function setupUser() {
        if (!user) return;

        // Maak profiel aan/bijwerken
        await supabase.from('users').upsert({ id: user.id, email: user.email });

        // Check op ban
        const { data, error } = await supabase.from('users').select('is_banned').eq('id', user.id).single();
        
        if (data?.is_banned) {
            document.getElementById("banOverlay").style.display = "flex";
            chatScreen.style.display = "none";
            return;
        }

        // Switch naar chat scherm
        loginScreen.style.display = "none";
        chatScreen.style.display = "flex";
        loadMessages();
        subscribeToChanges();
    }

    // 3. Data ophalen
    async function loadMessages() {
        const { data, error } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
        if (error) {
            console.error("401 Check: Als je dit ziet, moet je je browser cache legen.", error);
            return;
        }
        if (data) {
            messagesDiv.innerHTML = "";
            data.forEach(msg => renderMessage(msg));
        }
    }

    // 4. Bericht versturen
    async function sendMessage() {
        const content = textInput.value.trim();
        if (!content || !user) return;

        textInput.value = "";
        const { error } = await supabase.from('messages').insert([{ content, user_id: user.id }]);
        
        if (error) {
            console.error("Verzenden mislukt:", error.message);
            if (error.message.includes("JWT")) {
                alert("Sessie verlopen. Ververs de pagina.");
                await supabase.auth.signOut();
            }
        }
    }

    // 5. Realtime
    function subscribeToChanges() {
        supabase.channel('public_chat')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                renderMessage(payload.new);
            })
            .subscribe();
    }

    // 6. UI Render
    function renderMessage(msg) {
        const isMe = user && msg.user_id === user.id;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : 'other'}`;
        const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Veiligheid: Voorkom XSS
        const safeContent = document.createTextNode(msg.content);
        div.appendChild(safeContent);
        
        const timeSpan = document.createElement('span');
        timeSpan.className = 'time';
        timeSpan.textContent = time;
        div.appendChild(timeSpan);

        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Events
    loginBtn.onclick = async () => {
        const email = document.getElementById("emailInput").value.trim();
        if (!email) return;

        loginBtn.disabled = true;
        loginInfo.textContent = "Laden...";

        const { error } = await supabase.auth.signInWithOtp({ 
            email,
            options: { emailRedirectTo: window.location.origin }
        });

        if (error) {
            loginInfo.textContent = "Fout: " + error.message;
            loginBtn.disabled = false;
        } else {
            loginInfo.textContent = "Check je inbox voor de Magic Link!";
        }
    };

    sendBtn.onclick = sendMessage;
    textInput.onkeydown = (e) => { if (e.key === "Enter") sendMessage(); };

    checkSession();
</script>
</body>
</html>
