<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}html,body{height:100%;background:#0f0f14;color:#fff;display:flex;justify-content:center;align-items:center}#app{width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;border-left:1px solid #222;border-right:1px solid #222}#loginScreen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;padding:20px}#loginScreen input{width:100%;padding:12px;border-radius:12px;border:none;background:#18181f;color:white;font-size:16px;outline:none}#loginScreen button{width:100%;padding:12px;border-radius:12px;border:none;background:#7dd3fc;color:#0f0f14;font-weight:bold;cursor:pointer;transition:.2s}#loginScreen button:hover{background:#38bdf8}#loginInfo{color:#aaa;font-size:14px;text-align:center}#chatScreen{flex:1;display:flex;flex-direction:column}#messages{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}.msg{margin-bottom:10px;padding:8px 12px;border-radius:12px;max-width:80%;word-wrap:break-word;opacity:.95}.me{background:#2563eb;margin-left:auto;text-align:right;color:white}.other{background:#222;margin-right:auto;text-align:left;color:white}.time{display:block;font-size:10px;color:#aaa;margin-top:2px}#inputBar{display:flex;padding:12px;border-top:1px solid #222;background:#0f0f14;gap:8px}#text{flex:1;background:#18181f;border:none;padding:12px;border-radius:12px;color:white;outline:none;font-size:16px}#send{background:#7dd3fc;border:none;padding:12px 16px;border-radius:12px;color:#0f0f14;font-weight:bold;cursor:pointer;transition:.2s}#send:hover{background:#38bdf8}#banOverlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:flex;justify-content:center;align-items:center;color:#ff5555;font-size:24px;font-weight:bold;z-index:9999;display:none;text-align:center;padding:20px}
</style>
</head>
<body>
<div id="app">
<div id="loginScreen">
<h2>Login</h2>
<input id="emailInput" type="email" placeholder="Your email..."/>
<button id="loginBtn">Send magic link</button>
<p id="loginInfo"></p>
</div>
<div id="chatScreen" style="display:none;flex:1;flex-direction:column;">
<div id="messages"></div>
<div id="inputBar">
<input id="text" placeholder="Type a message..." autocomplete="off"/>
<button id="send">Send</button>
</div>
</div>
</div>
<div id="banOverlay">YOU ARE BANNED</div>
<script type="module">
import{createClient}from"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";const SUPABASE_URL="https://jjsbdsoqpsrpygvgdbuf.supabase.co";const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqc2Jkc29xcHNycHlndmdkYnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NDIxMDksImV4cCI6MjA4NjExODEwOX0.3QFlAZu40szj6zp45ikxkKYa_mRLambTqXurFqMnIZk";const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);const loginScreen=document.getElementById("loginScreen"),chatScreen=document.getElementById("chatScreen"),emailInput=document.getElementById("emailInput"),loginBtn=document.getElementById("loginBtn"),loginInfo=document.getElementById("loginInfo"),messagesDiv=document.getElementById("messages"),input=document.getElementById("text"),sendBtn=document.getElementById("send"),banOverlay=document.getElementById("banOverlay");let user=null,isBanned=false;async function checkSession(){const{data:{session}}=await supabase.auth.getSession();if(session?.user){user=session.user;await autoRegisterUser();await checkBanStatus();isBanned?showBan():(showChat(),loadMessages())}}async function sendMagicLink(){const e=emailInput.value.trim();if(!e)return;const{error}=await supabase.auth.signInWithOtp({email:e,options:{emailRedirectTo:window.location.origin}});loginInfo.textContent=error?"An error occurred...":"Check your inbox for the magic link"}loginBtn.onclick=sendMagicLink,checkSession();async function autoRegisterUser(){if(!user)return;await supabase.from("users").upsert({id:user.id,email:user.email},{onConflict:["id"]})}function showChat(){loginScreen.style.display="none",chatScreen.style.display="flex"}function showBan(){loginScreen.style.display="none",chatScreen.style.display="none",banOverlay.style.display="flex"}async function checkBanStatus(){const{data}=await supabase.from("users").select("is_banned").eq("id",user.id).single();data&&(isBanned=data.is_banned)}function addMessage(e,t=!1,a=null){const n=document.createElement("div");n.className="msg "+(t?"me":"other"),n.innerHTML=e+(a?`<span class="time">${a}</span>`:""),messagesDiv.appendChild(n),messagesDiv.scrollTop=messagesDiv.scrollHeight}async function loadMessages(){const{data}=await supabase.from("messages").select("*").order("created_at");data?.forEach(e=>addMessage(e.content,e.user_id===user.id,new Date(e.created_at).toLocaleTimeString()))}supabase.channel("chat").on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},e=>{const t=e.new;addMessage(t.content,t.user_id===user.id,new Date(t.created_at).toLocaleTimeString())}).subscribe();async function sendMessage(){if(!input.value.trim()||!user||isBanned)return;await supabase.from("messages").insert({content:input.value}),input.value=""}sendBtn.onclick=sendMessage,input.addEventListener("keydown",e=>{"Enter"===e.key&&sendMessage()});
</script>
</body>
</html>
