<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        html,body{height:100%;background:#0f0f14;color:#fff;display:flex;justify-content:center;align-items:center}
        #app{width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;border-left:1px solid #222;border-right:1px solid #222}
        #loginScreen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;padding:20px}
        #loginScreen input{width:100%;padding:12px;border-radius:12px;border:none;background:#18181f;color:white;font-size:16px;outline:none}
        #loginScreen button{width:100%;padding:12px;border-radius:12px;border:none;background:#7dd3fc;color:#0f0f14;font-weight:bold;cursor:pointer;transition:.2s}
        #loginScreen button:hover{background:#38bdf8}
        #loginInfo{color:#aaa;font-size:14px;text-align:center}
        #chatScreen{flex:1;display:flex;flex-direction:column}
        #messages{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
        .msg{margin-bottom:10px;padding:8px 12px;border-radius:12px;max-width:80%;word-wrap:break-word;opacity:.95}
        .me{background:#2563eb;margin-left:auto;text-align:right;color:white}
        .other{background:#222;margin-right:auto;text-align:left;color:white}
        .time{display:block;font-size:10px;color:#aaa;margin-top:2px}
        #inputBar{display:flex;padding:12px;border-top:1px solid #222;background:#0f0f14;gap:8px}
        #text{flex:1;background:#18181f;border:none;padding:12px;border-radius:12px;color:white;outline:none;font-size:16px}
        #send{background:#7dd3fc;border:none;padding:12px 16px;border-radius:12px;color:#0f0f14;font-weight:bold;cursor:pointer;transition:.2s}
        #send:hover{background:#38bdf8}
        #banOverlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:flex;justify-content:center;align-items:center;color:#ff5555;font-size:24px;font-weight:bold;z-index:9999;display:none;text-align:center;padding:20px}
    </style>
</head>
<body>

<div id="app">
    <div id="loginScreen">
        <h2>Login</h2>
        <input id="emailInput" type="email" placeholder="Je e-mailadres..."/>
        <button id="loginBtn">Stuur magic link</button>
        <p id="loginInfo"></p>
    </div>

    <div id="chatScreen" style="display:none; flex:1; flex-direction:column;">
        <div id="messages"></div>
        <div id="inputBar">
            <input id="text" placeholder="Typ een bericht..." autocomplete="off"/>
            <button id="send">Verzend</button>
        </div>
    </div>
</div>

<div id="banOverlay">JE BENT VERBANNEN</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // ---------------- CONFIG ----------------
    const SUPABASE_URL = "https://jjsbdsoqpsrpygvgdbuf.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqc2Jkc29xcHNycHlndmdkYnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NDIxMDksImV4cCI6MjA4NjExODEwOX0.3QFlAZu40szj6zp45ikxkKYa_mRLambTqXurFqMnIZk"; 

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ---------------- UI ELEMENTS ----------------
    const loginScreen = document.getElementById("loginScreen");
    const chatScreen = document.getElementById("chatScreen");
    const emailInput = document.getElementById("emailInput");
    const loginBtn = document.getElementById("loginBtn");
    const loginInfo = document.getElementById("loginInfo");
    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("text");
    const sendBtn = document.getElementById("send");
    const banOverlay = document.getElementById("banOverlay");

    let user = null;
    let isBanned = false;

    // ---------------- LOGIN LOGICA ----------------
    async function checkSession() {
        const { data: { session }, error } = await supabase.auth.getSession();
        if (session?.user) {
            user = session.user;
            console.log("Ingelogd als:", user.email);
            await autoRegisterUser();
            await checkBanStatus();
            
            if (isBanned) {
                showBan();
            } else {
                showChat();
                loadMessages();
                setupRealtime();
            }
        }
    }

    async function sendMagicLink() {
        const email = emailInput.value.trim();
        if (!email) return;
        
        loginBtn.disabled = true;
        loginInfo.textContent = "Laden...";

        const { error } = await supabase.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: window.location.origin }
        });

        if (error) {
            loginInfo.textContent = "Fout: " + error.message;
            loginBtn.disabled = false;
        } else {
            loginInfo.textContent = "Check je inbox voor de magic link!";
        }
    }

    // ---------------- DATABASE ACTIES ----------------
    async function autoRegisterUser() {
        if (!user) return;
        // Upsert zorgt dat de gebruiker wordt aangemaakt of bijgewerkt in je eigen 'users' tabel
        const { error } = await supabase.from('users').upsert({ 
            id: user.id, 
            email: user.email 
        }, { onConflict: ['id'] });
        
        if (error) console.error("Registratie fout:", error.message);
    }

    async function checkBanStatus() {
        const { data, error } = await supabase
            .from('users')
            .select('is_banned')
            .eq('id', user.id)
            .single();
        
        if (data) isBanned = data.is_banned;
    }

    async function loadMessages() {
        const { data, error } = await supabase
            .from("messages")
            .select("*")
            .order("created_at", { ascending: true });

        if (error) {
            console.error("Berichten laden mislukt:", error.message);
            return;
        }

        messagesDiv.innerHTML = ""; // Clear voor de zekerheid
        data.forEach(m => {
            addMessage(m.content, m.user_id === user.id, new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
        });
    }

    async function sendMessage() {
        const content = input.value.trim();
        if (!content || !user || isBanned) return;

        const { error } = await supabase.from("messages").insert({
            content: content,
            user_id: user.id // CRUCIAAL: stuur de ID van de huidige gebruiker mee
        });

        if (error) {
            console.error("Verzenden mislukt:", error.message);
            alert("Bericht kon niet verzonden worden. Check je RLS settings.");
        } else {
            input.value = "";
        }
    }

    // ---------------- REALTIME ----------------
    function setupRealtime() {
        supabase.channel("public:messages")
            .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, payload => {
                const msg = payload.new;
                // Alleen toevoegen als het bericht nog niet door 'mij' is toegevoegd (voorkomt dubbele weergave)
                addMessage(msg.content, msg.user_id === user.id, new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
            })
            .subscribe();
    }

    // ---------------- HELPERS ----------------
    function addMessage(msg, isMe = false, time = null) {
        const div = document.createElement("div");
        div.className = "msg " + (isMe ? "me" : "other");
        div.innerHTML = `<div>${escapeHTML(msg)}</div>` + (time ? `<span class="time">${time}</span>` : "");
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    function showChat() {
        loginScreen.style.display = "none";
        chatScreen.style.display = "flex";
    }

    function showBan() {
        loginScreen.style.display = "none";
        chatScreen.style.display = "none";
        banOverlay.style.display = "flex";
    }

    // ---------------- EVENTS ----------------
    loginBtn.onclick = sendMagicLink;
    sendBtn.onclick = sendMessage;
    input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

    // Start check
    checkSession();

</script>
</body>
</html>
