<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hyperrush Secure Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #fff; --surface: #fff; --border: #e2e2e7; --text-main: #1c1c1e;
            --text-mute: #636366; --accent: #007aff; --danger: #ff3b30;
            --success: #34c759; --warning: #ff9500; --pad: 32px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent }
        ::-webkit-scrollbar { width: 5px }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px }
        body { height: 100dvh; background: #f2f2f7; color: var(--text-main); display: flex; justify-content: center; align-items: center; overflow: hidden }
        #app { width: 100%; max-width: 440px; height: 100%; position: relative; display: flex; flex-direction: column; background: var(--bg); box-shadow: 0 0 50px rgba(0, 0, 0, 0.1); overflow: hidden }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding: var(--pad); background: var(--bg) }
        .screen.active { display: flex; animation: fadeIn 0.3s ease }
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
        .center-content { justify-content: center; align-items: center; text-align: center }
        .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 32px; flex-shrink: 0; width: 100% }
        .title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; color: #000; margin-bottom: 8px }
        .subtitle { color: var(--text-mute); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 32px; display: block }
        .input-field { width: 100%; background: #f2f2f7; border: 1px solid transparent; border-radius: 12px; padding: 16px; color: var(--text-main); font-size: 16px; outline: none; margin-bottom: 16px; transition: 0.2s }
        .input-field:focus { border-color: var(--accent); background: #fff }
        .btn { width: 100%; height: 56px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text-main); font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1) }
        .btn-accent { background: var(--text-main); color: #fff; border: none }
        #toast-container { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); z-index: 100000; width: 85%; pointer-events: none }
        .toast-item { background: #1c1c1e; color: #fff; padding: 16px; border-radius: 12px; font-weight: 600; font-size: 13px; text-align: center; margin-bottom: 8px; display: none; animation: tIn 0.3s ease-out forwards }
        .toast-item.visible { display: flex; justify-content: center }
        @keyframes tIn { from { opacity: 0; transform: translateY(-10px) } to { opacity: 1; transform: translateY(0) } }
        .overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: var(--pad) }
        .overlay.active { display: flex }
        .modal { width: 100%; background: #fff; border-radius: 20px; padding: 32px }
        .profile-info-stack { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px }
        .info-item { text-align: left }
        .info-item label { font-size: 10px; font-weight: 800; color: var(--text-mute); text-transform: uppercase; display: block; margin-bottom: 4px }
        .info-item span { font-size: 15px; font-weight: 600; color: var(--text-main); word-break: break-all }
        #room-list, #chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; width: 100% }
        .room-card { padding: 20px; border-radius: 16px; background: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid var(--border); width: 100% }
        .msg { max-width: 85%; padding: 10px 16px; border-radius: 16px; display: flex; flex-direction: column; line-height: 1.4; position: relative }
        .message-me { align-self: flex-end; background: white; border: 1px solid #9ec9db; border-bottom-right-radius: 4px }
        .message-other { align-self: flex-start; background: white; border: 1px solid #c7c7c7; border-bottom-left-radius: 4px }
        .msg-user { font-size: 10px; font-weight: 800; opacity: 0.7; margin-bottom: 2px; text-transform: uppercase; cursor: pointer }
        .msg-time { font-size: 9px; opacity: 0.5; align-self: flex-end; margin-top: 4px }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d1d6; margin-right: 8px; transition: 0.3s }
        .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success) }
        .status-dot.reconnecting { background: var(--warning); animation: pulse 1s infinite }
        @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
        #offline-overlay { position: absolute; inset: 0; background: rgba(255, 59, 48, 0.15); backdrop-filter: blur(12px); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px }
        #offline-overlay.active { display: flex }
        #loader-overlay { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.9); z-index: 20000; display: none; align-items: center; justify-content: center }
        #loader-overlay.active { display: flex }
        .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: var(--text-main); border-radius: 50%; animation: spin .8s linear infinite }
        @keyframes spin { to { transform: rotate(360deg) } }
    </style>
</head>
<body>
    <div id="app">
        <div id="loader-overlay"><div class="spinner"></div></div>
        <div id="toast-container"></div>
        <div id="offline-overlay">
            <i data-lucide="zap-off" size="48" style="color:var(--danger);margin-bottom:16px"></i>
            <h2 class="title" style="font-size:20px">Link Severed</h2>
            <p style="color:var(--text-mute);font-size:14px">Syncing secure tunnel...</p>
        </div>

        <div id="user-modal" class="overlay" onclick="this.classList.remove('active')">
            <div class="modal" onclick="event.stopPropagation()">
                <h2 class="title" style="text-align:center;margin-bottom:24px">User Profile</h2>
                <div class="profile-info-stack">
                    <div class="info-item"><label>Profile ID</label><span id="m-id">---</span></div>
                    <div class="info-item"><label>Full Name</label><span id="m-name">---</span></div>
                    <div class="info-item"><label>Email Address</label><span id="m-email">---</span></div>
                    <div class="info-item"><label>Member Since</label><span id="m-date">---</span></div>
                </div>
                <button class="btn btn-accent" onclick="document.getElementById('user-modal').classList.remove('active')">Close</button>
            </div>
        </div>

        <div id="scr-start" class="screen active center-content">
            <div style="margin-bottom: 24px;"><i data-lucide="shield-check" size="80"></i></div>
            <h1 class="title">HRN Chat</h1>
            <p class="subtitle">Secure Messaging</p>
            <button class="btn btn-accent action-btn" onclick="window.nav('scr-login')" style="margin-bottom:12px">Sign In</button>
            <button class="btn action-btn" onclick="window.nav('scr-register')">Create Account</button>
        </div>

        <div id="scr-register" class="screen center-content">
            <h1 class="title">Sign Up</h1>
            <input id="r-name" class="input-field" placeholder="Full Name">
            <input id="r-email" class="input-field" type="email" placeholder="Email">
            <input id="r-pass" type="password" class="input-field" placeholder="Password" onkeyup="if(event.key==='Enter') window.handleRegister()">
            <button id="btn-reg" class="btn btn-accent action-btn" onclick="window.handleRegister()">Continue</button>
            <button class="btn action-btn" style="border:none;margin-top:8px" onclick="window.nav('scr-start')">Cancel</button>
        </div>

        <div id="scr-login" class="screen center-content">
            <h1 class="title">Welcome</h1>
            <input id="l-email" class="input-field" type="email" placeholder="Email">
            <input id="l-pass" type="password" class="input-field" placeholder="Password" onkeyup="if(event.key==='Enter') window.handleLogin()">
            <button id="btn-login" class="btn btn-accent action-btn" onclick="window.handleLogin()">Sign In</button>
            <button class="btn action-btn" style="border:none;margin-top:8px" onclick="window.nav('scr-start')">Go Back</button>
        </div>

        <div id="scr-lobby" class="screen">
            <div class="header">
                <h1 class="title" style="font-size:22px">Channels</h1>
                <div style="display:flex;gap:15px;align-items:center">
                    <i data-lucide="plus" onclick="window.nav('scr-create')" style="cursor:pointer"></i>
                    <i data-lucide="log-out" onclick="window.handleLogout()" style="cursor:pointer;color:var(--danger)"></i>
                </div>
            </div>
            <input id="search-bar" class="input-field" placeholder="Search channels..." oninput="window.filterRooms()">
            <div id="room-list"></div>
            <div style="display:flex;gap:12px;margin-top:20px">
                <input id="join-id" class="input-field" style="margin:0;flex:1" placeholder="ID">
                <button class="btn btn-accent action-btn" style="width:80px" onclick="window.joinPrivate()">Join</button>
            </div>
        </div>

        <div id="scr-gate" class="screen center-content">
            <h1 class="title">Restricted</h1>
            <input id="gate-pass" type="password" class="input-field" placeholder="••••••••" onkeyup="if(event.key==='Enter') window.submitGate()">
            <button class="btn btn-accent action-btn" onclick="window.submitGate()">Unlock</button>
            <button class="btn action-btn" style="border:none;margin-top:8px" onclick="window.nav('scr-lobby')">Cancel</button>
        </div>

        <div id="scr-chat" class="screen">
            <div class="header">
                <div style="display:flex;align-items:center;flex:1">
                    <i data-lucide="chevron-left" onclick="window.leaveChat()" style="cursor:pointer;margin-right:16px"></i>
                    <div id="live-indicator" class="status-dot"></div>
                    <h2 id="chat-title" class="title" style="font-size:18px;margin-bottom:0">---</h2>
                </div>
                <i data-lucide="copy" onclick="window.copyId()" style="cursor:pointer;opacity:0.5"></i>
            </div>
            <div id="chat-messages"></div>
            <div style="display:flex;gap:12px;padding-top:20px">
                <input id="chat-input" class="input-field" style="margin:0;flex:1" placeholder="Type a message..." onkeyup="if(event.key==='Enter') window.sendMsg()">
                <button id="btn-send" class="btn btn-accent action-btn" style="width:52px;height:52px;border-radius:14px" onclick="window.sendMsg()">
                    <i data-lucide="arrow-up"></i>
                </button>
            </div>
        </div>

        <div id="scr-create" class="screen center-content">
            <h1 class="title">New</h1>
            <input id="c-name" class="input-field" placeholder="Name">
            <input id="c-pass" class="input-field" placeholder="Key (Optional)">
            <button class="btn btn-accent action-btn" onclick="window.handleCreate()">Create</button>
            <button class="btn action-btn" style="border:none;margin-top:8px" onclick="window.nav('scr-lobby')">Cancel</button>
        </div>

        <div id="scr-success" class="screen center-content">
            <h1 class="title">Ready</h1>
            <div id="s-id" class="input-field" style="cursor:pointer;color:var(--accent)" onclick="window.copySId()">---</div>
            <button class="btn btn-accent action-btn" onclick="window.enterCreated()">Enter</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

        const URL = "https://fahbqdajxnhswevdagdn.supabase.co",
              KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhaGJxZGFqeG5oc3dldmRhZ2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NTEyODEsImV4cCI6MjA4NjEyNzI4MX0.UPgPxyaWBULjH4jL8UaSr6bJXTsFWWJRIYodHmXeVTI",
              SALT = "H7a1lPjHvVBA5",
              db = createClient(URL, KEY);

        let user, room, roomName, sub, allRooms = [], toastQueue = [], isToastActive = false, wasOffline = false, isWSConnected = false;

        // --- EXTREEM GOED AFSLUITEN WS ---
        const forceKillWS = async () => {
            isWSConnected = false;
            document.getElementById('live-indicator').className = 'status-dot';
            if (sub) {
                try {
                    await sub.unsubscribe();
                    await db.removeChannel(sub);
                } catch (e) {}
                sub = null;
            }
        };

        // --- MONITOR & RECONNECT ---
        setInterval(async () => {
            const isOnline = navigator.onLine;
            const overlay = document.getElementById('offline-overlay');
            const btns = document.querySelectorAll('.action-btn');
            const sendBtn = document.getElementById('btn-send');

            if (!isOnline) {
                if (!wasOffline) {
                    overlay.classList.add('active');
                    btns.forEach(b => b.disabled = true);
                    await forceKillWS();
                    wasOffline = true;
                }
            } else if (wasOffline) {
                overlay.classList.remove('active');
                btns.forEach(b => b.disabled = false);
                wasOffline = false;
                if (user && room && roomName) {
                    setTimeout(() => window.openVault(room, roomName), 200);
                }
            }
            if (sendBtn) sendBtn.disabled = !isWSConnected || !isOnline;
        }, 250);

        // --- AUTH: GEEN AUTO-CLOSE GROEP BIJ FOCUS ---
        db.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                user = session.user;
                const activeScr = document.querySelector('.screen.active').id;
                if (['scr-start', 'scr-login', 'scr-register'].includes(activeScr)) {
                    window.nav('scr-lobby');
                    loadRooms();
                }
            } else {
                user = null;
                window.nav('scr-start');
            }
        });

        const iI = () => { if (window.lucide) lucide.createIcons(); else setTimeout(iI, 50) };
        window.nav = e => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(e).classList.add('active'); iI(); };
        
        window.toast = e => { toastQueue.push(e); if(!isToastActive) pQ(); };
        async function pQ() {
            if (0 === toastQueue.length) return isToastActive = false;
            isToastActive = true;
            const e = toastQueue.shift(), t = document.getElementById('toast-container'), s = document.createElement('div');
            s.className = 'toast-item visible'; s.innerText = e; t.appendChild(s);
            await new Promise(r => setTimeout(r, 2500)); s.remove(); pQ();
        }

        const cN = () => navigator.onLine || (window.toast("No Link"), false);

        window.handleLogin = async () => {
            if (!cN()) return;
            const e = document.getElementById('l-email').value, t = document.getElementById('l-pass').value;
            document.getElementById('loader-overlay').classList.add('active');
            const { error } = await db.auth.signInWithPassword({ email: e, password: t });
            document.getElementById('loader-overlay').classList.remove('active');
            if (error) window.toast(error.message);
        };

        window.handleRegister = async () => {
            if (!cN()) return;
            const n = document.getElementById('r-name').value, e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value;
            document.getElementById('loader-overlay').classList.add('active');
            const { data, error } = await db.auth.signUp({ email: e, password: p, options: { data: { full_name: n } } });
            if (!error) {
                await db.from('profiles').insert([{ id: data.user.id, full_name: n, email: e }]);
                window.nav('scr-login');
            } else window.toast(error.message);
            document.getElementById('loader-overlay').classList.remove('active');
        };

        window.handleLogout = () => db.auth.signOut();

        async function loadRooms() {
            const { data } = await db.from('rooms').select('*').eq('is_private', false);
            allRooms = data || []; renderRooms(allRooms);
        }

        const renderRooms = e => {
            document.getElementById('room-list').innerHTML = e.map(r => `
                <div class="room-card" onclick="window.joinAttempt('${r.id}','${r.name}','${r.password}')">
                    <span style="font-weight:700">${r.name}</span>
                    <i data-lucide="${r.password ? 'lock' : 'chevron-right'}" size="18"></i>
                </div>
            `).join(''); iI();
        };

        window.joinAttempt = (i, n, p) => p && p !== 'null' ? (window.pending = { i, n, p }, window.nav('scr-gate')) : window.openVault(i, n);
        window.submitGate = () => document.getElementById('gate-pass').value === window.pending.p ? window.openVault(window.pending.i, window.pending.n) : window.toast("Wrong Key");

        window.openVault = async (i, n) => {
            if (!navigator.onLine) return;
            await forceKillWS();
            room = i; roomName = n; document.getElementById('chat-title').innerText = n; window.nav('scr-chat');
            
            const { data } = await db.from('messages').select('*').eq('room_id', i).order('created_at', { ascending: true });
            const b = document.getElementById('chat-messages');
            b.innerHTML = data.map(m => renderMsg(m)).join(''); b.scrollTop = b.scrollHeight;
            
            document.getElementById('live-indicator').className = 'status-dot reconnecting';
            sub = db.channel(`room_${i}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${i}` }, e => {
                b.insertAdjacentHTML('beforeend', renderMsg(e.new)); b.scrollTop = b.scrollHeight;
            }).subscribe(s => {
                isWSConnected = (s === 'SUBSCRIBED');
                document.getElementById('live-indicator').className = 'status-dot ' + (isWSConnected ? 'online' : 'reconnecting');
            });
        };

        const renderMsg = m => {
            let t = "...", s = "";
            try {
                const dec = CryptoJS.AES.decrypt(m.content, SALT).toString(CryptoJS.enc.Utf8);
                [s, t] = dec.split('|');
            } catch {}
            return `<div class="msg ${m.user_id === user.id ? 'message-me' : 'message-other'}">
                <span class="msg-user" onclick="window.showUser('${m.user_id}')">${m.user_name}</span>${t}<span class="msg-time">${s}</span>
            </div>`;
        };

        window.sendMsg = async () => {
            if (!isWSConnected) return;
            const i = document.getElementById('chat-input'), v = i.value.trim();
            if (v && cN()) {
                i.value = ""; const d = new Date(), t = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
                const c = CryptoJS.AES.encrypt(t + "|" + v, SALT).toString();
                await db.from('messages').insert([{ room_id: room, user_id: user.id, user_name: user.user_metadata.full_name, content: c }]);
            }
        };

        window.showUser = async (u) => {
            document.getElementById('loader-overlay').classList.add('active');
            const { data: d } = await db.from('profiles').select('*').eq('id', u).single();
            document.getElementById('loader-overlay').classList.remove('active');
            if (d) {
                const date = new Date(d.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                document.getElementById('m-id').innerText = d.id; document.getElementById('m-name').innerText = d.full_name;
                document.getElementById('m-email').innerText = d.email; document.getElementById('m-date').innerText = date;
                document.getElementById('user-modal').classList.add('active');
            }
        };

        window.handleCreate = async () => {
            const n = document.getElementById('c-name').value, p = document.getElementById('c-pass').value;
            if (n && cN()) {
                const { data } = await db.from('rooms').insert([{ name: n, password: p || null, is_private: false, created_by: user.id }]).select();
                if (data) { lastCreated = data[0]; document.getElementById('s-id').innerText = lastCreated.id; window.nav('scr-success'); }
            }
        };

        window.leaveChat = async () => { await forceKillWS(); room = null; roomName = null; window.nav('scr-lobby'); };
        window.copyId = () => { navigator.clipboard.writeText(room); window.toast("ID Copied"); };
        window.copySId = () => { navigator.clipboard.writeText(lastCreated.id); window.toast("ID Copied"); };
        window.enterCreated = () => window.openVault(lastCreated.id, lastCreated.name);
        window.filterRooms = () => {
            const q = document.getElementById('search-bar').value.toLowerCase();
            renderRooms(allRooms.filter(r => r.name.toLowerCase().includes(q)));
        };

        iI();
    </script>
</body>
</html>
