<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hyperrush Chat V43</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050507;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --border-active: rgba(255, 255, 255, 0.4);
            --text-main: #ffffff;
            --text-mute: #88888e;
            --accent: #00d2ff;
            --danger: #ff4444;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; 
            background: var(--bg); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
        }
        
        #app { 
            width: 100%; 
            max-width: 440px; 
            height: 100%; 
            position: relative; 
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border); 
            border-right: 1px solid var(--border); 
            background: rgba(5,5,7,0.8); 
            backdrop-filter: blur(20px); 
        }

        .screen { 
            position: absolute; 
            inset: 0; 
            display: none; 
            flex-direction: column; 
            padding: 25px;
        }
        
        .screen.active { 
            display: flex; 
            animation: fadeIn 0.2s ease-out; 
            position: relative;
            flex: 1;
        }

        .centered-y { justify-content: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 15px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .title { font-size: 28px; font-weight: 800; letter-spacing: -1px; text-align: center; margin-bottom: 4px; }
        .subtitle { color: var(--text-mute); font-size: 8px; font-weight: 700; margin-bottom: 35px; text-align: center; text-transform: uppercase; letter-spacing: 3px; }

        .btn { width: 100%; height: 52px; border-radius: 12px; border: 1px solid var(--border-active); background: transparent; color: #fff; font-weight: 700; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1.5px; }
        .btn:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }
        .btn-mute { border: 1px solid var(--border); color: var(--text-mute); }

        .input-field { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; font-size: 14px; outline: none; text-align: center; margin-bottom: 10px; }

        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            padding: 10px 0;
            scroll-behavior: smooth; 
        }

        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); align-self: flex-start; }
        .msg.me { align-self: flex-end; border-color: rgba(0, 210, 255, 0.2); border-bottom-right-radius: 2px; }
        
        .msg-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 2px; }
        .msg-user { font-size: 10px; font-weight: 700; color: var(--accent); }
        .msg-time { font-size: 9px; color: var(--text-mute); }
        .msg-text { font-size: 13px; line-height: 1.4; color: var(--text-main); white-space: pre-wrap; word-break: break-word; }

        .chat-input-container { 
            display: flex; 
            align-items: flex-end; 
            gap: 8px; 
            padding-top: 10px;
            padding-bottom: 5px; 
            border-top: 1px solid var(--border); 
            flex-shrink: 0;
        }

        #chat-input { 
            flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
            padding: 10px 14px; color: white; font-size: 14px; outline: none; resize: none; 
            min-height: 42px; max-height: 100px; line-height: 1.4; 
        }

        .send-btn { border: 1px solid var(--accent); background: none; width: 42px; height: 42px; border-radius: 10px; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        .overlay { position: absolute; inset: 0; background: rgba(5,5,7,0.98); z-index: 2000; display: none; flex-direction: column; justify-content: center; padding: 30px; backdrop-filter: blur(15px); }
        .overlay.active { display: flex; }

        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 10px; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 3000; }
        #toast.visible { opacity: 1; visibility: visible; }

        .room-card { width: 100%; padding: 16px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 8px; }
    </style>
</head>
<body>

<div id="app">
    <div id="toast">SYSTEM</div>

    <div id="scr-start" class="screen active centered-y">
        <i data-lucide="message-square" size="48" color="#fff" style="margin: 0 auto 20px auto;"></i>
        <h1 class="title">HYPERRUSH</h1>
        <p class="subtitle">Secure Chat 2026</p>
        <button class="btn" onclick="nav('scr-login')">Sign in (E-mail)</button>
        <button class="btn btn-mute" onclick="nav('scr-register')" style="margin-top:10px;">Sign up (E-mail)</button>
    </div>

    <div id="scr-register" class="screen centered-y">
        <h1 class="title">Sign Up | Chats</h1>
        <p class="subtitle">New User Registration</p>
        <input type="text" id="r-name" class="input-field" placeholder="Display Name">
        <input type="email" id="r-email" class="input-field" placeholder="Email Address">
        <input type="password" id="r-pass" class="input-field" placeholder="Create Password">
        <button class="btn" onclick="handleRegister()">Continue</button>
        <button onclick="nav('scr-start')" class="btn btn-mute" style="border:none; margin-top:10px;">Cancel</button>
    </div>

    <div id="scr-verify" class="screen centered-y">
        <h1 class="title">Verify</h1>
        <p class="subtitle">Enter Confirmation Code</p>
        <input type="number" id="v-code" class="input-field" placeholder="000000">
        <button class="btn" onclick="handleVerify()">Join Hyperrush</button>
    </div>

    <div id="scr-login" class="screen centered-y">
        <h1 class="title">Sign In | Chats</h1>
        <p class="subtitle">Sign in with an e-mail adress.</p>
        <input type="email" id="l-email" class="input-field" placeholder="Email Address">
        <input type="password" id="l-pass" class="input-field" placeholder="Password">
        <button class="btn" onclick="handleLogin()">Login</button>
        <button onclick="nav('scr-start')" class="btn btn-mute" style="border:none; margin-top:10px;">Back</button>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="header">
            <h1 class="title" style="font-size: 20px; margin:0;">Channels</h1>
            <div style="display:flex; gap:16px;">
                <i data-lucide="search" size="20" onclick="openJoinUI()" style="cursor:pointer; opacity:0.6;"></i>
                <i data-lucide="plus" size="20" onclick="nav('scr-create')" style="cursor:pointer; color:var(--accent);"></i>
                <i data-lucide="log-out" size="20" onclick="location.reload()" style="cursor:pointer; color:var(--danger);"></i>
            </div>
        </div>
        <div id="room-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="scr-create" class="screen centered-y">
        <h1 class="title">New Channel</h1>
        <p class="subtitle">Initialize Chatroom</p>
        <input type="text" id="c-name" class="input-field" placeholder="Channel Name">
        <input type="password" id="c-pass" class="input-field" placeholder="Access Code (Optional)">
        <button class="btn" onclick="handleCreate()">Create</button>
        <button onclick="nav('scr-lobby')" class="btn btn-mute" style="border:none; margin-top:10px;">Cancel</button>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header">
            <i data-lucide="chevron-left" onclick="leaveChat()" style="cursor:pointer;"></i>
            <h2 id="chat-title" style="font-size: 14px; font-weight:800; letter-spacing: 1px;">CHANNEL</h2>
            <i data-lucide="info" size="18" onclick="copyId()" style="cursor:pointer; opacity:0.4;"></i>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-container">
            <textarea id="chat-input" rows="1" placeholder="Send a message..."></textarea>
            <button class="send-btn" onclick="sendMsg()"><i data-lucide="send" size="18"></i></button>
        </div>
    </div>

    <div id="ovl-join" class="overlay">
        <div style="background:var(--surface); border:1px solid var(--border); padding:30px; border-radius:20px; text-align:center;">
            <h3 style="margin-bottom:15px; letter-spacing: 1px;">JOIN BY ID</h3>
            <input type="text" id="join-id-input" class="input-field" placeholder="Channel-ID-xxxx">
            <button class="btn" onclick="handleJoinByID()">Connect</button>
            <button class="btn btn-mute" onclick="closeJoinUI()" style="margin-top:10px; border:none;">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const URL = "https://fahbqdajxnhswevdagdn.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhaGJxZGFqeG5oc3dldmRhZ2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NTEyODEsImV4cCI6MjA4NjEyNzI4MX0.UPgPxyaWBULjH4jL8UaSr6bJXTsFWWJRIYodHmXeVTI";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwoHBjaZgzAiv0G9iKfKriKMPxA9Zjm0Fg9dQjtuJuCntuSe3oPP9uvxu1LzwF8aPER/exec";
    const SALT = "HyperRush_99_Vault";

    const db = createClient(URL, KEY);
    let user = null, room = null, sub = null, tempReg = {};

    const escapeHTML = (s) => s ? s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : "";
    
    const crypt = (t) => {
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}]`;
        return CryptoJS.AES.encrypt(timeStr + t, SALT).toString();
    };

    const decryptData = (c) => {
        try {
            const raw = CryptoJS.AES.decrypt(c, SALT).toString(CryptoJS.enc.Utf8);
            if(raw.startsWith('[')) {
                const endBracket = raw.indexOf(']');
                return { time: raw.substring(1, endBracket), text: escapeHTML(raw.substring(endBracket + 1)) };
            }
            return { time: "--:--", text: escapeHTML(raw) };
        } catch { return { time: "??:??", text: "[ENCRYPTION ERROR]" }; }
    };

    window.nav = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        lucide.createIcons();
    };

    window.toast = (m) => {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('visible');
        setTimeout(() => t.classList.remove('visible'), 2500);
    };

    window.handleRegister = async () => {
        tempReg = { n: document.getElementById('r-name').value, e: document.getElementById('r-email').value, p: document.getElementById('r-pass').value };
        if(!tempReg.n || !tempReg.e || !tempReg.p) return window.toast("DATA REQUIRED");
        window.toast("SENDING CODE...");
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "send", email: tempReg.e }) });
        window.nav('scr-verify');
    };

    window.handleVerify = async () => {
        const { data, error } = await db.auth.signUp({ email: tempReg.e, password: tempReg.p, options: { data: { full_name: tempReg.n } } });
        if(!error) { user = data.user; window.nav('scr-lobby'); window.loadRooms(); }
        else window.toast(error.message.toUpperCase());
    };

    window.handleLogin = async () => {
        const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
        const { data, error } = await db.auth.signInWithPassword({ email: e, password: p });
        if(!error) { user = data.user; window.nav('scr-lobby'); window.loadRooms(); }
        else window.toast("LOGIN FAILED");
    };

    window.loadRooms = async () => {
        const { data } = await db.from('rooms').select('*').or(`is_private.eq.false,created_by.eq.${user.id}`).order('created_at', { ascending: false });
        document.getElementById('room-list').innerHTML = (data || []).map(r => `
            <div class="room-card" onclick="joinAttempt('${r.id}', '${escapeHTML(r.name)}', '${r.password}')">
                <span style="font-size:13px; font-weight:600;">${escapeHTML(r.name)}</span>
                <i data-lucide="${r.password ? 'lock' : 'chevron-right'}" size="14" style="opacity:0.4;"></i>
            </div>
        `).join('');
        lucide.createIcons();
    };

    window.joinAttempt = (id, name, p) => {
        if(p && p !== "null" && p !== "" && prompt("ENTER CHANNEL CODE:") !== p) return window.toast("INVALID CODE");
        window.openVault(id, name);
    };

    window.openJoinUI = () => document.getElementById('ovl-join').classList.add('active');
    window.closeJoinUI = () => document.getElementById('ovl-join').classList.remove('active');
    window.handleJoinByID = async () => {
        const id = document.getElementById('join-id-input').value.trim();
        const {data} = await db.from('rooms').select('*').eq('id', id).single();
        if(data) { closeJoinUI(); joinAttempt(data.id, data.name, data.password); }
        else window.toast("CHANNEL NOT FOUND");
    };

    window.handleCreate = async () => {
        const n = document.getElementById('c-name').value, p = document.getElementById('c-pass').value;
        if(!n) return window.toast("NAME REQUIRED");
        const { data } = await db.from('rooms').insert([{ name: n, password: p || null, created_by: user.id }]).select();
        if(data) window.loadRooms(), window.nav('scr-lobby');
    };

    window.openVault = async (id, name) => {
        room = id;
        document.getElementById('chat-title').innerText = name.toUpperCase();
        window.nav('scr-chat');
        const { data } = await db.from('messages').select('*').eq('room_id', id).order('created_at', { ascending: true });
        const box = document.getElementById('chat-messages');
        box.innerHTML = (data || []).map(m => render(m)).join('');
        box.scrollTop = box.scrollHeight;
        if(sub) db.removeChannel(sub);
        sub = db.channel(`room_${id}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${id}` }, 
        p => { box.insertAdjacentHTML('beforeend', render(p.new)); box.scrollTop = box.scrollHeight; }).subscribe();
    };

    const render = (m) => {
        const d = decryptData(m.content);
        return `<div class="msg ${m.user_id === user.id ? 'me' : 'them'}"><div class="msg-header"><span class="msg-user">${m.user_name}</span><span class="msg-time">${d.time}</span></div><div class="msg-text">${d.text}</div></div>`;
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        const val = i.value.trim();
        if(!val) return;
        i.value = '';
        i.style.height = '42px'; 
        await db.from('messages').insert([{ room_id: room, user_id: user.id, user_name: user.user_metadata.full_name, content: crypt(val) }]);
    };

    const tx = document.getElementById('chat-input');
    tx.addEventListener('input', function() {
        this.style.height = '42px';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    tx.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    });

    window.leaveChat = () => { if(sub) db.removeChannel(sub); window.nav('scr-lobby'); };
    window.copyId = () => { navigator.clipboard.writeText(room); window.toast("CHANNEL ID COPIED"); };

    lucide.createIcons();
</script>
</body>
</html>
