<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>404 &middot Page Not Found</title>
      <style>
         :root{--bg:#fefefe;--text-main:#1c1c1e;--text-muted:#a0a0a5}*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}html,body{height:100%;width:100%;background:var(--bg);display:flex;justify-content:center;align-items:center;color:var(--text-main)}.container{text-align:center;display:flex;flex-direction:column;gap:12px}h1{font-family:'Impact','Arial Black',sans-serif;font-size:6rem;font-weight:400;color:#262626;line-height:1;letter-spacing:-2px}p{font-size:1rem;font-weight:300;color:var(--text-muted);max-width:280px;margin:0 auto;line-height:1.4}@media(max-width:480px){h1{font-size:4.5rem;letter-spacing:-1px}p{font-size:0.9rem}}
      </style>
   </head>
   <body>
      <div class="container">
         <h1>404</h1>
         <p>Page not found.</p>
      </div>
   </body>
</html>
